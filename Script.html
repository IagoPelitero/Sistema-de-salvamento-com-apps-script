<script>
/* ============================================================
   BASE DE CONHECIMENTO — Script.html
   Lógica do cliente: cache em memória, pesquisa em tempo real,
   CRUD via google.script.run, temas, favoritos e atalhos.
   ============================================================ */
(() => {
  'use strict';

  /* ----------------------------------------------------------
   * Constantes e estado
   * -------------------------------------------------------- */
  const TEMAS = [
    { id: 'portobank', nome: 'PortoBank' },
    { id: 'rosa',      nome: 'Rosa' },
    { id: 'dark',      nome: 'Dark' }
  ];

  const LIMITE_TEXTO_CURTO = 320; // acima disso o card ganha "Ver mais"

  /**
   * Sentinela para o filtro "Sem subcategoria".
   * Usa um caractere de controle para nunca colidir com uma
   * subcategoria real que o usuário venha a chamar de "Geral".
   */
  const SEM_SUB = '\u0001';

  const Estado = {
    registros: [],            // cache local — carregado uma única vez
    carregado: false,
    filtroTipo: 'TODOS',      // TODOS | FAQ | TAB
    somenteFavoritos: false,  // eixo independente do tipo
    filtroCategoria: '',
    filtroSubcategoria: '',
    busca: '',
    favoritos: new Set(),
    historico: [],
    expandidos: new Set(),    // IDs com texto expandido
    editandoId: null,         // ID em edição (null = novo cadastro)
    tipoForm: 'FAQ',
    salvando: false,
    confirmarAcao: null,      // callback do modal de confirmação
    focoAnterior: null,       // elemento que abriu o modal
    tela: 'home',             // home | cadastro | dashboard | config
    prefs: {},                // preferências do usuário (localStorage)
    limite: 0,                // quantos cards já foram renderizados
    assinatura: '',           // combinação de filtros do último desenho
    carregadoEm: 0,           // timestamp da última leitura do servidor
    revalidando: false
  };

  const $ = (sel) => document.querySelector(sel);
  const $$ = (sel) => Array.from(document.querySelectorAll(sel));

  /* ----------------------------------------------------------
   * Utilitários
   * -------------------------------------------------------- */

  /** Escapa HTML para exibição segura. */
  function escaparHtml(texto) {
    return String(texto)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  /** Remove acentos preservando o tamanho da string (para busca). */
  function normalizar(texto) {
    return String(texto)
      .toLowerCase()
      .normalize('NFD')
      .replace(/[\u0300-\u036f]/g, '');
  }

  /**
   * Normaliza preservando o alinhamento de índices com o texto original.
   * Cada caractere vira exatamente um caractere normalizado, para que
   * uma posição encontrada na versão normalizada valha também na original.
   * @param {string} texto
   * @returns {string}
   */
  function normalizarAlinhado(texto) {
    return Array.from(String(texto))
      .map(c => {
        const n = c.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
        return n.length === 1 ? n : c.toLowerCase();
      })
      .join('');
  }

  /**
   * OTIMIZAÇÃO P-01 — índice de busca pré-computado.
   *
   * Antes, cada tecla digitada refazia a normalização caractere a
   * caractere do texto completo de TODOS os registros visíveis. Com
   * 400 registros de 1.500 caracteres, eram centenas de milhares de
   * chamadas de normalize() por tecla.
   *
   * Agora esse trabalho acontece UMA vez por registro, no carregamento
   * (e ao criar/editar). Durante a digitação sobra apenas indexOf.
   *
   * @param {Object} r - Registro do cache.
   * @returns {Object} O mesmo registro, com campos derivados.
   */
  function indexar(r) {
    r._n = {
      categoria: normalizarAlinhado(r.categoria),
      subcategoria: normalizarAlinhado(r.subcategoria),
      descricao: normalizarAlinhado(r.descricao),
      texto: normalizarAlinhado(r.texto),
      criadoPor: normalizarAlinhado(r.criadoPor)
    };

    // Campo único usado pelo filtro (evita 5 buscas separadas por registro).
    r._busca = [r._n.categoria, r._n.subcategoria, r._n.descricao,
                r._n.texto, r._n.criadoPor].join(' ');

    // Timestamp pré-calculado: evita parse de data a cada comparação do sort.
    r._ts = tempoDe(r.dataCriacao);
    return r;
  }

  /** Termos da busca atual (múltiplas palavras = AND implícito). */
  function termosBusca() {
    return normalizar(Estado.busca).split(/\s+/).filter(Boolean);
  }

  /**
   * Destaca todos os termos pesquisados em um campo já indexado.
   * Recebe a versão normalizada pronta, então não normaliza nada aqui.
   * @param {string} original - Texto exibido.
   * @param {string} base - Versão normalizada e alinhada.
   * @param {string[]} termos - Termos normalizados.
   * @returns {string} HTML escapado, com <mark> nas ocorrências.
   */
  function destacar(original, base, termos) {
    original = String(original);
    if (!termos || !termos.length) return escaparHtml(original);

    // 1. Coleta as ocorrências de cada termo.
    const marcas = [];
    termos.forEach(termo => {
      let pos = 0;
      while (pos <= base.length) {
        const achou = base.indexOf(termo, pos);
        if (achou === -1) break;
        marcas.push([achou, achou + termo.length]);
        pos = achou + termo.length;
      }
    });

    if (!marcas.length) return escaparHtml(original);

    // 2. Funde intervalos sobrepostos (termos que se cruzam no texto).
    marcas.sort((a, b) => a[0] - b[0]);
    const fundidas = [];
    marcas.forEach(m => {
      const ultima = fundidas[fundidas.length - 1];
      if (ultima && m[0] <= ultima[1]) ultima[1] = Math.max(ultima[1], m[1]);
      else fundidas.push([m[0], m[1]]);
    });

    // 3. Monta a saída escapando tudo que vem do usuário.
    let saida = '', pos = 0;
    fundidas.forEach(par => {
      saida += escaparHtml(original.slice(pos, par[0]));
      saida += '<mark>' + escaparHtml(original.slice(par[0], par[1])) + '</mark>';
      pos = par[1];
    });
    return saida + escaparHtml(original.slice(pos));
  }

  /** Converte "dd/MM/yyyy HH:mm" em timestamp para ordenação. */
  function tempoDe(dataBr) {
    if (!dataBr) return 0;
    const [data, hora] = String(dataBr).split(' ');
    const [dia, mes, ano] = (data || '').split('/').map(Number);
    const [hh, mm] = (hora || '0:0').split(':').map(Number);
    if (!ano) return 0;
    return new Date(ano, (mes || 1) - 1, dia || 1, hh || 0, mm || 0).getTime();
  }

  /** Exibe um toast temporário. */
  function toast(mensagem, tipo) {
    const el = document.createElement('div');
    el.className = 'toast' + (tipo === 'erro' ? ' erro' : '');
    el.textContent = mensagem;
    $('#toasts').appendChild(el);
    setTimeout(() => {
      el.classList.add('saindo');
      setTimeout(() => el.remove(), 260);
    }, 2600);
  }

  /** Tempo máximo de espera por uma resposta do servidor (ms). */
  const TIMEOUT_SERVIDOR = 30000;

  /**
   * Executa uma função do servidor retornando Promise.
   *
   * CORREÇÃO B-02: o google.script.run pode nunca chamar nenhum dos
   * handlers (conexão perdida, script suspenso). Sem timeout, o botão
   * ficava travado em "Salvando…" para sempre e o usuário perdia o
   * conteúdo digitado. O guard "finalizado" garante que a Promise
   * resolva ou rejeite uma única vez.
   */
  function servidor(funcao, ...args) {
    return new Promise((resolver, rejeitar) => {
      let finalizado = false;

      const temporizador = setTimeout(() => {
        if (finalizado) return;
        finalizado = true;
        rejeitar(new Error('O servidor demorou para responder. Verifique sua conexão e tente novamente.'));
      }, TIMEOUT_SERVIDOR);

      const encerrar = (acao) => (valor) => {
        if (finalizado) return;
        finalizado = true;
        clearTimeout(temporizador);
        acao(valor);
      };

      google.script.run
        .withSuccessHandler(encerrar(resolver))
        .withFailureHandler(encerrar(err => {
          rejeitar(new Error(err && err.message ? err.message : 'Erro no servidor.'));
        }))
        [funcao](...args);
    });
  }

  /* ----------------------------------------------------------
   * Persistência local (tema e favoritos)
   * -------------------------------------------------------- */

  /**
   * Preferências do usuário, com os padrões atuais do sistema.
   * Alterar um padrão aqui muda o comportamento de quem nunca
   * abriu a tela de configurações.
   */
  const PADROES = {
    tema: 'portobank',
    densidade: 'confortavel',
    linhas: '4',
    animacoes: 'ligadas',
    agrupar: 'sim',
    historico: 'sim'
  };

  function carregarPreferencias() {
    Estado.prefs = Object.assign({}, PADROES);

    try {
      const salvas = JSON.parse(localStorage.getItem('bc_prefs') || '{}');
      Object.keys(PADROES).forEach(chave => {
        if (salvas[chave] !== undefined) Estado.prefs[chave] = salvas[chave];
      });

      // Compatibilidade: versões anteriores guardavam o tema em chave própria.
      const temaAntigo = localStorage.getItem('bc_tema');
      if (salvas.tema === undefined && temaAntigo) Estado.prefs.tema = temaAntigo;

      const favs = JSON.parse(localStorage.getItem('bc_favoritos') || '[]');
      Estado.favoritos = new Set(favs);
    } catch (e) { /* armazenamento indisponível — segue com os padrões */ }

    if (!TEMAS.some(t => t.id === Estado.prefs.tema)) Estado.prefs.tema = PADROES.tema;

    aplicarPreferencias();
    carregarHistorico();
  }

  function salvarPreferencias() {
    try {
      localStorage.setItem('bc_prefs', JSON.stringify(Estado.prefs));
    } catch (e) { /* ignora */ }
  }

  /** Reflete as preferências no documento (atributos lidos pelo CSS). */
  function aplicarPreferencias() {
    const p = Estado.prefs;
    const raiz = document.documentElement;

    raiz.setAttribute('data-theme', p.tema);
    raiz.setAttribute('data-densidade', p.densidade);
    raiz.setAttribute('data-animacoes', p.animacoes);
    raiz.style.setProperty('--linhas-card', p.linhas);
  }

  /**
   * Altera uma preferência, persiste e reaplica o que for necessário.
   * @param {string} chave
   * @param {string} valor
   */
  function definirPreferencia(chave, valor) {
    if (Estado.prefs[chave] === valor) return;

    Estado.prefs[chave] = valor;
    salvarPreferencias();
    aplicarPreferencias();
    marcarPreferenciasNaTela();

    // Só o agrupamento muda o que é desenhado na lista.
    if (chave === 'agrupar') renderizar();
  }

  /** Quantos cards entram por lote na renderização incremental. */
  const LOTE = 60;

  /** Intervalo mínimo entre revalidações automáticas (5 minutos). */
  const INTERVALO_REVALIDACAO = 5 * 60 * 1000;

  /** Máximo de buscas guardadas no histórico. */
  const LIMITE_HISTORICO = 8;

  function carregarHistorico() {
    try {
      const bruto = JSON.parse(localStorage.getItem('bc_historico') || '[]');
      Estado.historico = Array.isArray(bruto) ? bruto.slice(0, LIMITE_HISTORICO) : [];
    } catch (e) {
      Estado.historico = [];
    }
  }

  /**
   * Registra um termo no histórico. Chamado apenas quando a busca é
   * "confirmada" (Enter ou uso de um resultado) — não a cada tecla,
   * o que encheria a lista de fragmentos como "car", "cart", "carta".
   */
  function registrarBusca(termo) {
    termo = String(termo || '').trim();
    if (termo.length < 3) return;

    Estado.historico = [termo].concat(
      Estado.historico.filter(t => normalizar(t) !== normalizar(termo))
    ).slice(0, LIMITE_HISTORICO);

    try {
      localStorage.setItem('bc_historico', JSON.stringify(Estado.historico));
    } catch (e) { /* armazenamento indisponível — ignora */ }
  }

  function limparHistorico() {
    Estado.historico = [];
    try { localStorage.removeItem('bc_historico'); } catch (e) { /* ignora */ }
    fecharHistorico();
    toast('Histórico de pesquisa limpo.');
  }

  function abrirHistorico() {
    const caixa = $('#historico-busca');
    if (!Estado.historico.length) { caixa.hidden = true; return; }

    caixa.innerHTML =
      '<div class="historico-titulo">Buscas recentes</div>' +
      Estado.historico.map(t =>
        `<button class="historico-item" data-termo="${escaparHtml(t)}">🕐 ${escaparHtml(t)}</button>`
      ).join('') +
      '<button class="historico-limpar" data-acao="limpar">Limpar histórico</button>';

    caixa.hidden = false;
  }

  function fecharHistorico() {
    $('#historico-busca').hidden = true;
  }

  function salvarFavoritos() {
    try {
      localStorage.setItem('bc_favoritos', JSON.stringify([...Estado.favoritos]));
    } catch (e) { /* armazenamento indisponível — ignora */ }
  }

  function aplicarTema(id) {
    definirPreferencia('tema', id);
    const tema = TEMAS.find(t => t.id === id);
    if (tema) toast('Tema ' + tema.nome + ' aplicado.');
  }

  /* ----------------------------------------------------------
   * Carregamento de dados (uma única chamada ao servidor)
   * -------------------------------------------------------- */

  async function carregarRegistros() {
    try {
      const resposta = await servidor('getAllRecords');
      Estado.registros = (resposta.registros || []).map(indexar);
      Estado.carregado = true;
      Estado.carregadoEm = Date.now();
      $('#skeleton').hidden = true;
      atualizarCategorias();
      renderizar();
    } catch (erro) {
      $('#skeleton').hidden = true;
      $('#estado-vazio').hidden = false;
      $('#vazio-titulo').textContent = 'Não foi possível carregar os dados';
      $('#vazio-texto').textContent = erro.message + ' Recarregue a página para tentar novamente.';
      toast('Erro ao carregar registros.', 'erro');
    }
  }

  /**
   * CORREÇÃO B-03 — revalidação do cache.
   *
   * Os dados eram lidos uma única vez por sessão, então dois atendentes
   * trabalhando ao mesmo tempo não viam os cadastros um do outro até
   * recarregar a página — o que gera cadastro duplicado e uso de texto
   * desatualizado. Agora há atualização manual e automática ao voltar
   * para a aba, respeitando um intervalo mínimo.
   *
   * @param {boolean} silencioso - Não avisa quando nada mudou.
   */
  async function revalidar(silencioso) {
    if (Estado.revalidando) return;

    Estado.revalidando = true;
    const botao = $('#btn-atualizar');
    botao.classList.add('girando');

    try {
      const resposta = await servidor('getAllRecords');
      const novos = (resposta.registros || []).map(indexar);

      const antes = new Set(Estado.registros.map(r => r.id));
      const incluidos = novos.filter(r => !antes.has(r.id)).length;
      const removidos = Estado.registros.filter(r => !novos.some(n => n.id === r.id)).length;

      Estado.registros = novos;
      Estado.carregadoEm = Date.now();

      atualizarCategorias();
      renderizar();

      if (incluidos || removidos) {
        const partes = [];
        if (incluidos) partes.push(incluidos + ' novo' + (incluidos > 1 ? 's' : ''));
        if (removidos) partes.push(removidos + ' removido' + (removidos > 1 ? 's' : ''));
        toast('Base atualizada: ' + partes.join(' e ') + '.');
      } else if (!silencioso) {
        toast('Tudo já estava atualizado.');
      }
    } catch (erro) {
      if (!silencioso) toast(erro.message, 'erro');
    } finally {
      Estado.revalidando = false;
      botao.classList.remove('girando');
    }
  }

  /* ----------------------------------------------------------
   * Filtros, pesquisa e renderização
   * -------------------------------------------------------- */

  /**
   * Monta o índice hierárquico Categoria → Set(Subcategorias)
   * a partir do cache local. Recalculado apenas quando os dados mudam.
   * @returns {Map<string, Set<string>>}
   */
  function mapaHierarquia() {
    const mapa = new Map();
    Estado.registros.forEach(r => {
      if (!r.categoria) return;
      if (!mapa.has(r.categoria)) mapa.set(r.categoria, new Set());
      if (r.subcategoria) mapa.get(r.categoria).add(r.subcategoria);
    });
    return mapa;
  }

  /**
   * Matizes usados para colorir categorias — 18 tons espaçados em 20°.
   * A saturação e a luminosidade ficam a cargo do tema
   * (ver --cat-sat / --cat-luz no Style.html).
   *
   * Por que 18 e não 10: com um hash, o número de tons distintos segue
   * o paradoxo do aniversário. Com 10 tons, 10 categorias produzem ~6,5
   * cores distintas; com 18, sobem para ~8. Colisão ainda é possível,
   * mas a cor é um apoio visual — o rótulo continua sendo a informação.
   */
  const MATIZES = [
    0, 20, 40, 60, 80, 100, 120, 140, 160,
    180, 200, 220, 240, 260, 280, 300, 320, 340
  ];

  /**
   * Deriva uma cor estável a partir do nome da categoria.
   *
   * Determinístico e sem cadastro: a mesma categoria recebe sempre o
   * mesmo tom, em qualquer navegador, sem coluna nova na planilha nem
   * tela de configuração. Usa djb2 sobre o nome normalizado, então
   * "Cartão" e "cartao" caem na mesma cor.
   *
   * @param {string} categoria
   * @returns {number} Matiz HSL (0–360).
   */
  function matizCategoria(categoria) {
    const chave = normalizar(categoria);

    // djb2 para acumular os caracteres...
    let hash = 5381;
    for (let i = 0; i < chave.length; i++) {
      hash = ((hash << 5) + hash + chave.charCodeAt(i)) >>> 0;
    }

    // ...seguido de avalanche, para que nomes parecidos ("Cartão de
    // crédito" e "Cartão de débito") não caiam em tons vizinhos.
    // Cada etapa termina com >>> 0: operadores bitwise devolvem int32
    // COM SINAL, e um hash negativo produziria índice negativo na paleta.
    hash = (hash ^ (hash >>> 16)) >>> 0;
    hash = Math.imul(hash, 0x45d9f3b) >>> 0;
    hash = (hash ^ (hash >>> 16)) >>> 0;

    return MATIZES[hash % MATIZES.length];
  }

  /** Ordenação alfabética respeitando acentuação do português. */
  function ordemPtBr(a, b) {
    return a.localeCompare(b, 'pt-BR');
  }

  /** Popula os selects de categoria/subcategoria e os datalists do formulário. */
  function atualizarCategorias() {
    const mapa = mapaHierarquia();
    const categorias = [...mapa.keys()].sort(ordemPtBr);

    const select = $('#filtro-categoria');
    const valorAtual = select.value;
    select.innerHTML = '<option value="">Todas as categorias</option>' +
      categorias.map(c => `<option value="${escaparHtml(c)}">${escaparHtml(c)}</option>`).join('');

    if (categorias.includes(valorAtual)) {
      select.value = valorAtual;
    } else if (valorAtual) {
      // CORREÇÃO B-01: a categoria selecionada deixou de existir (o último
      // registro dela foi excluído). O <select> voltava sozinho para "Todas",
      // mas Estado.filtroCategoria mantinha o valor antigo — a lista ficava
      // permanentemente vazia, sem motivo aparente, até recarregar a página.
      select.value = '';
      Estado.filtroCategoria = '';
    }

    // Datalist do formulário (sugestões de categoria).
    $('#lista-categorias').innerHTML =
      categorias.map(c => `<option value="${escaparHtml(c)}">`).join('');

    atualizarSubcategorias(mapa);
    atualizarSugestoesSubcategoria(mapa);
  }

  /**
   * Preenche o select de subcategoria em cascata: só oferece as
   * subcategorias que existem dentro da categoria selecionada.
   * @param {Map} [mapa] - Índice já calculado, se disponível.
   */
  function atualizarSubcategorias(mapa) {
    mapa = mapa || mapaHierarquia();
    const select = $('#filtro-subcategoria');
    const categoria = Estado.filtroCategoria;

    if (!categoria) {
      select.innerHTML = '<option value="">Todas as subcategorias</option>';
      select.value = '';
      select.disabled = true;
      Estado.filtroSubcategoria = '';
      return;
    }

    const subs = [...(mapa.get(categoria) || [])].sort(ordemPtBr);
    const temSemSub = Estado.registros.some(r => r.categoria === categoria && !r.subcategoria);

    select.innerHTML = '<option value="">Todas as subcategorias</option>' +
      subs.map(sub => `<option value="${escaparHtml(sub)}">${escaparHtml(sub)}</option>`).join('') +
      (temSemSub ? `<option value="${SEM_SUB}">Sem subcategoria</option>` : '');

    select.disabled = subs.length === 0 && !temSemSub;

    // Mesma proteção do B-01, agora no segundo nível da hierarquia.
    const aindaExiste = Estado.filtroSubcategoria === SEM_SUB
      ? temSemSub
      : subs.includes(Estado.filtroSubcategoria);

    if (Estado.filtroSubcategoria && !aindaExiste) Estado.filtroSubcategoria = '';
    select.value = Estado.filtroSubcategoria;
  }

  /**
   * Sugestões de subcategoria no formulário, filtradas pela categoria
   * já digitada. Sem categoria conhecida, sugere todas as existentes.
   * @param {Map} [mapa]
   */
  function atualizarSugestoesSubcategoria(mapa) {
    mapa = mapa || mapaHierarquia();
    const campo = $('#campo-categoria');
    const categoria = campo ? campo.value.trim() : '';

    const subs = (categoria && mapa.has(categoria))
      ? [...mapa.get(categoria)]
      : [...new Set(Estado.registros.map(r => r.subcategoria).filter(Boolean))];

    $('#lista-subcategorias').innerHTML =
      subs.sort(ordemPtBr).map(sub => `<option value="${escaparHtml(sub)}">`).join('');
  }

  /** Há algum filtro ou busca ativa? Usado pelo contador e pelo botão de limpar. */
  function temFiltroAtivo() {
    return !!(Estado.busca.trim() || Estado.filtroTipo !== 'TODOS' ||
              Estado.filtroCategoria || Estado.filtroSubcategoria ||
              Estado.somenteFavoritos);
  }

  /** Zera os filtros sem avisar o usuário — uso interno antes de aplicar outro. */
  function limparFiltrosSilencioso() {
    Estado.busca = '';
    Estado.filtroTipo = 'TODOS';
    Estado.filtroCategoria = '';
    Estado.filtroSubcategoria = '';
    Estado.somenteFavoritos = false;

    $('#campo-pesquisa').value = '';
    $('#filtro-categoria').value = '';

    $$('.chip').forEach(c => {
      const ativo = c.dataset.filtro === 'TODOS';
      c.classList.toggle('ativo', ativo);
      c.setAttribute('aria-pressed', String(ativo));
    });

    const favoritos = $('#btn-favoritos');
    favoritos.classList.remove('ativo');
    favoritos.setAttribute('aria-pressed', 'false');
    favoritos.querySelector('.btn-favoritos-icone').textContent = '☆';

    fecharHistorico();
  }

  /** Devolve a lista ao estado inicial, sem recarregar dados do servidor. */
  function limparFiltros() {
    limparFiltrosSilencioso();
    atualizarSubcategorias();
    renderizar();
    toast('Filtros limpos.');
  }

  /**
   * Aplica filtros e busca sobre o cache local.
   * Múltiplas palavras funcionam como AND implícito: "cartao cancelamento"
   * exige as duas, em qualquer campo e em qualquer ordem.
   */
  function filtrar() {
    const termos = termosBusca();

    return Estado.registros.filter(r => {
      if (Estado.somenteFavoritos && !Estado.favoritos.has(r.id)) return false;
      if (Estado.filtroTipo !== 'TODOS' && r.tipo !== Estado.filtroTipo) return false;
      if (Estado.filtroCategoria && r.categoria !== Estado.filtroCategoria) return false;

      if (Estado.filtroSubcategoria) {
        if (Estado.filtroSubcategoria === SEM_SUB) {
          if (r.subcategoria) return false;
        } else if (r.subcategoria !== Estado.filtroSubcategoria) {
          return false;
        }
      }

      if (!termos.length) return true;
      return termos.every(termo => r._busca.includes(termo));
    });
  }

  /** Ordena: favoritos primeiro, depois data de criação decrescente. */
  function ordenar(lista) {
    return lista.sort((a, b) => {
      const favA = Estado.favoritos.has(a.id) ? 1 : 0;
      const favB = Estado.favoritos.has(b.id) ? 1 : 0;
      if (favA !== favB) return favB - favA;
      return b._ts - a._ts;
    });
  }

  /** Monta o HTML de um card de registro. */
  function htmlCard(r, termos) {
    const favorito = Estado.favoritos.has(r.id);
    const longo = r.texto.length > LIMITE_TEXTO_CURTO;
    const expandido = Estado.expandidos.has(r.id);
    const editado = r.ultimaAlteracao && r.ultimaAlteracao !== r.dataCriacao;
    const rotuloTipo = r.tipo === 'FAQ' ? 'FAQ' : 'Tabulação';

    // Caminho hierárquico como pílulas: informação de localização
    // precisa ser reconhecível de relance, não texto secundário.
    const caminho =
      `<span class="pilula pilula-categoria">${destacar(r.categoria, r._n.categoria, termos)}</span>` +
      (r.subcategoria
        ? `<span class="pilula pilula-subcategoria">${destacar(r.subcategoria, r._n.subcategoria, termos)}</span>`
        : '');
    const caminhoSimples = r.subcategoria ? r.categoria + ' › ' + r.subcategoria : r.categoria;

    return `
      <article class="card tipo-${r.tipo} ${favorito ? 'favorito' : ''}" data-id="${r.id}"
               aria-label="${rotuloTipo}: ${escaparHtml(r.descricao)} — ${escaparHtml(caminhoSimples)}"
               style="--matiz:${matizCategoria(r.categoria)}">
        <div class="card-topo">
          <span class="badge badge-${r.tipo}">${rotuloTipo}</span>
          <span class="caminho" title="${escaparHtml(caminhoSimples)}">${caminho}</span>
          <button class="btn-favorito ${favorito ? 'ativo' : ''}" data-acao="favoritar"
                  aria-pressed="${favorito}"
                  aria-label="${favorito ? 'Remover dos favoritos' : 'Adicionar aos favoritos'}: ${escaparHtml(r.descricao)}"
                  title="${favorito ? 'Remover dos favoritos' : 'Favoritar'}">${favorito ? '⭐' : '☆'}</button>
        </div>

        <h3 class="card-descricao">${destacar(r.descricao, r._n.descricao, termos)}</h3>

        <div class="card-texto ${longo && !expandido ? 'recolhido' : ''}">${destacar(r.texto, r._n.texto, termos)}</div>
        ${longo ? `<button class="btn-expandir" data-acao="expandir"
                    aria-expanded="${expandido}"
                    aria-label="${expandido ? 'Recolher' : 'Expandir'} o texto de ${escaparHtml(r.descricao)}">${expandido ? 'Ver menos ▲' : 'Ver mais ▼'}</button>` : ''}

        <div class="card-rodape">
          <div class="card-meta">
            <span title="${escaparHtml(r.criadoPor)}">👤 ${destacar(r.criadoPor, r._n.criadoPor, termos)}</span>
            <span>🕐 ${escaparHtml(r.dataCriacao)}${editado ? ' · editado em ' + escaparHtml(r.ultimaAlteracao) : ''}</span>
          </div>
          <div class="card-acoes">
            <button class="btn-copiar" data-acao="copiar"
                    aria-label="Copiar o texto de ${escaparHtml(r.descricao)}"
                    title="Copiar texto"><span aria-hidden="true">📋</span> Copiar</button>
            <button class="btn-icone" data-acao="editar"
                    aria-label="Editar ${escaparHtml(r.descricao)}" title="Editar">✏️</button>
            <button class="btn-icone" data-acao="imprimir"
                    aria-label="Imprimir ${escaparHtml(r.descricao)}" title="Imprimir / PDF">🖨️</button>
            <button class="btn-icone" data-acao="excluir"
                    aria-label="Excluir ${escaparHtml(r.descricao)}" title="Excluir">🗑️</button>
          </div>
        </div>
      </article>`;
  }

  /**
   * Agrupa os resultados por um nível da hierarquia.
   *
   * Sem categoria filtrada, agrupa por categoria. Com uma categoria já
   * escolhida, agrupar por ela seria redundante — então desce um nível
   * e agrupa por subcategoria.
   *
   * @param {Array} resultados
   * @returns {Array<[string, Array]>} Pares [rótulo, registros].
   */
  function agrupar(resultados) {
    const porSub = !!Estado.filtroCategoria;
    const SEM = porSub ? 'Sem subcategoria' : 'Sem categoria';

    const mapa = new Map();
    resultados.forEach(r => {
      const chave = (porSub ? r.subcategoria : r.categoria) || SEM;
      if (!mapa.has(chave)) mapa.set(chave, []);
      mapa.get(chave).push(r);
    });

    // Alfabético, com o grupo "sem classificação" sempre no fim.
    return [...mapa.entries()].sort((a, b) => {
      if (a[0] === SEM) return 1;
      if (b[0] === SEM) return -1;
      return ordemPtBr(a[0], b[0]);
    });
  }

  /** Monta o HTML de um grupo com cabeçalho fixo. */
  function htmlGrupo(rotulo, itens, termos) {
    // Agrupando por subcategoria, a cor de referência continua sendo a
    // da categoria filtrada — mantém a identidade visual do recorte.
    const base = Estado.filtroCategoria || rotulo;

    return `
      <section class="grupo" style="--matiz:${matizCategoria(base)}">
        <h2 class="grupo-cabecalho">
          <span class="grupo-marca" aria-hidden="true"></span>
          <span class="grupo-nome">${escaparHtml(rotulo)}</span>
          <span class="grupo-contagem">${itens.length}</span>
        </h2>
        <div class="grupo-corpo lista-cards">
          ${itens.map(r => htmlCard(r, termos)).join('')}
        </div>
      </section>`;
  }

  /** Renderiza a lista completa e os contadores. */
  function renderizar() {
    if (!Estado.carregado) return;

    const resultados = ordenar(filtrar());
    const lista = $('#lista-cards');
    const vazio = $('#estado-vazio');

    // Contadores gerais (independem dos filtros).
    $('#qtd-faq').textContent = Estado.registros.filter(r => r.tipo === 'FAQ').length;
    $('#qtd-tab').textContent = Estado.registros.filter(r => r.tipo === 'TAB').length;
    atualizarContadorFavoritos();

    // Contador de resultados (só aparece quando há filtro/busca ativa).
    const filtrando = temFiltroAtivo();
    $('#btn-limpar').hidden = !filtrando;
    $('#sep-resultados').hidden = !filtrando;
    $('#qtd-resultados').hidden = !filtrando;
    if (filtrando) {
      $('#qtd-resultados').textContent = resultados.length + ' resultado' + (resultados.length === 1 ? '' : 's');
    }

    if (!resultados.length) {
      lista.hidden = true;
      vazio.hidden = false;
      $('#btn-vazio-limpar').hidden = !filtrando;
      if (Estado.somenteFavoritos && !Estado.favoritos.size) {
        $('#vazio-titulo').textContent = 'Você ainda não favoritou nada';
        $('#vazio-texto').textContent =
          'Use a estrela no canto do card para deixar à mão os textos que mais usa.';
      } else {
        $('#vazio-titulo').textContent = Estado.registros.length
          ? 'Nenhum resultado para os filtros atuais'
          : 'A base ainda está vazia';
        $('#vazio-texto').textContent = Estado.registros.length
          ? 'Tente outro termo ou limpe os filtros.'
          : 'Cadastre a primeira FAQ ou Tabulação para começar.';
      }
      return;
    }

    vazio.hidden = true;
    lista.hidden = false;

    const termos = termosBusca();

    // OTIMIZAÇÃO P-04 — renderização incremental.
    // Mudou o recorte (busca ou filtro)? Recomeça do primeiro lote.
    // Sem isso, filtrar depois de rolar muito manteria centenas de
    // cards no DOM sem necessidade.
    const assinatura = [Estado.busca, Estado.filtroTipo, Estado.filtroCategoria,
                        Estado.filtroSubcategoria, Estado.somenteFavoritos].join('|');
    if (assinatura !== Estado.assinatura) {
      Estado.assinatura = assinatura;
      Estado.limite = LOTE;
    }

    const visiveis = resultados.slice(0, Estado.limite);
    const restantes = resultados.length - visiveis.length;

    // Durante a busca a lista fica plana: o que importa é o resultado,
    // não a gaveta em que ele mora. Sem busca, o agrupamento transforma
    // a lista em navegação hierárquica.
    const agrupado = Estado.prefs.agrupar === 'sim' && !termos.length && visiveis.length > 1;
    lista.classList.toggle('agrupada', agrupado);

    lista.innerHTML = agrupado
      ? agrupar(visiveis).map(par => htmlGrupo(par[0], par[1], termos)).join('')
      : visiveis.map(r => htmlCard(r, termos)).join('');

    // A sentinela só existe enquanto houver o que carregar.
    const sentinela = $('#sentinela');
    sentinela.hidden = restantes <= 0;
    if (restantes > 0) {
      sentinela.querySelector('.sentinela-texto').textContent =
        `Mostrando ${visiveis.length} de ${resultados.length} — role para ver mais`;
    }
  }

  /* ----------------------------------------------------------
   * Ações dos cards
   * -------------------------------------------------------- */

  async function copiarTexto(registro) {
    const texto = registro.texto;
    try {
      await navigator.clipboard.writeText(texto);
    } catch (e) {
      // Fallback para navegadores/iframes sem Clipboard API.
      // CORREÇÃO B-06: execCommand pode lançar em iframes restritos.
      // Sem o catch, o erro escapava e o usuário não recebia retorno algum.
      const ta = document.createElement('textarea');
      ta.value = texto;
      ta.style.position = 'fixed';
      ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.focus();
      ta.select();
      let copiou = false;
      try { copiou = document.execCommand('copy'); } catch (e2) { copiou = false; } finally { ta.remove(); }
      if (!copiou) {
        toast('Não foi possível copiar. Selecione o texto e use Ctrl+C.', 'erro');
        return;
      }
    }
    toast('Texto copiado com sucesso.');
  }

  /** Localiza o elemento de um card já renderizado. */
  function cardDe(id) {
    return $('#lista-cards .card[data-id="' + id + '"]');
  }

  /**
   * OTIMIZAÇÃO P-03 — atualização cirúrgica.
   *
   * Favoritar recriava os 400 cards da lista só para trocar uma estrela.
   * Agora só o card afetado é tocado. Efeito colateral desejável: o card
   * não "salta" de posição sob o cursor — a reordenação por favoritos
   * passa a valer na próxima busca, filtro ou recarga.
   */
  function alternarFavorito(id) {
    const favorito = !Estado.favoritos.has(id);
    if (favorito) Estado.favoritos.add(id);
    else Estado.favoritos.delete(id);
    salvarFavoritos();

    const card = cardDe(id);
    if (!card) { renderizar(); return; }

    card.classList.toggle('favorito', favorito);

    const botao = card.querySelector('[data-acao="favoritar"]');
    botao.classList.toggle('ativo', favorito);
    botao.textContent = favorito ? '⭐' : '☆';
    botao.title = favorito ? 'Remover dos favoritos' : 'Favoritar';
    botao.setAttribute('aria-pressed', String(favorito));

    atualizarContadorFavoritos();

    // Com o filtro de favoritos ligado, desfavoritar precisa remover o card.
    if (Estado.somenteFavoritos && !favorito) renderizar();
  }

  /** Mantém o contador de favoritos em dia sem redesenhar a lista. */
  function atualizarContadorFavoritos() {
    const total = Estado.registros.filter(r => Estado.favoritos.has(r.id)).length;
    $('#qtd-fav').textContent = total;
  }

  /** Expande/recolhe apenas o card alvo, sem redesenhar a lista. */
  function alternarExpandido(id) {
    const expandido = !Estado.expandidos.has(id);
    if (expandido) Estado.expandidos.add(id);
    else Estado.expandidos.delete(id);

    const card = cardDe(id);
    if (!card) { renderizar(); return; }

    card.querySelector('.card-texto').classList.toggle('recolhido', !expandido);
    const botao = card.querySelector('[data-acao="expandir"]');
    if (botao) {
      botao.textContent = expandido ? 'Ver menos ▲' : 'Ver mais ▼';
      botao.setAttribute('aria-expanded', String(expandido));
    }
  }

  function imprimirRegistro(r) {
    const rotulo = r.tipo === 'FAQ' ? 'FAQ' : 'Tabulação';
    $('#print-area').innerHTML = `
      <h1>${escaparHtml(r.descricao)}</h1>
      <div class="print-meta">
        ${rotulo} · ${escaparHtml(r.categoria)} · ${escaparHtml(r.id)}<br>
        Criado por ${escaparHtml(r.criadoPor)} em ${escaparHtml(r.dataCriacao)}
        ${r.ultimaAlteracao !== r.dataCriacao ? ' · Última alteração: ' + escaparHtml(r.ultimaAlteracao) : ''}
      </div>
      <div class="print-texto">${escaparHtml(r.texto)}</div>`;
    window.print();
  }

  function pedirExclusao(registro) {
    $('#modal-mensagem').textContent =
      `Tem certeza que deseja excluir "${registro.descricao}" (${registro.id})? Esta ação não pode ser desfeita.`;
    Estado.confirmarAcao = async () => {
      try {
        await servidor('deleteRecord', registro.id);
        Estado.registros = Estado.registros.filter(r => r.id !== registro.id);
        Estado.favoritos.delete(registro.id);
        salvarFavoritos();
        atualizarCategorias();
        renderizar();
        toast('Registro excluído.');
      } catch (erro) {
        toast(erro.message, 'erro');
      }
    };
    Estado.focoAnterior = document.activeElement;
    $('#modal-confirmar').hidden = false;
    $('#modal-confirmar-btn').focus();
  }

  /**
   * AC-02 — gestão de foco do modal.
   *
   * Antes, o Tab continuava navegando pelos elementos ATRÁS do modal e,
   * ao fechar, o foco ia para o <body>: quem usa teclado perdia a
   * posição na lista. Agora o foco fica preso no diálogo e retorna ao
   * botão que o abriu.
   */
  function elementosFocaveis(container) {
    return $$('#' + container.id + ' button:not([disabled])');
  }

  function prenderFoco(e) {
    const modal = $('#modal-confirmar');
    if (modal.hidden || e.key !== 'Tab') return;

    const focaveis = elementosFocaveis(modal);
    if (!focaveis.length) return;

    const primeiro = focaveis[0];
    const ultimo = focaveis[focaveis.length - 1];

    if (e.shiftKey && document.activeElement === primeiro) {
      e.preventDefault();
      ultimo.focus();
    } else if (!e.shiftKey && document.activeElement === ultimo) {
      e.preventDefault();
      primeiro.focus();
    }
  }

  function fecharModal() {
    $('#modal-confirmar').hidden = true;
    Estado.confirmarAcao = null;

    // Devolve o foco a quem abriu o diálogo.
    if (Estado.focoAnterior && document.contains(Estado.focoAnterior)) {
      Estado.focoAnterior.focus();
    }
    Estado.focoAnterior = null;
  }

  /* ----------------------------------------------------------
   * Navegação entre telas
   * -------------------------------------------------------- */

  /**
   * Telas do sistema. Antes o atributo hidden era manipulado em quatro
   * lugares diferentes (achado C-02); agora existe um ponto único, o que
   * também evita duas telas visíveis ao mesmo tempo quando surge uma nova.
   */
  const TELAS = {
    home: '#view-home',
    cadastro: '#view-cadastro',
    dashboard: '#view-dashboard',
    config: '#view-config'
  };

  function irPara(tela) {

    });

    $('#btn-dashboard').setAttribute('aria-current', tela === 'dashboard' ? 'page' : 'false');
    $('#btn-config').setAttribute('aria-current', tela === 'config' ? 'page' : 'false');

  function abrirCadastro(registro) {

    $('#form-titulo').textContent = registro ? 'Editar Registro' : 'Novo Cadastro';
    $('#form-subtitulo').textContent = registro
      ? 'Editando ' + registro.id + '. O tipo não pode ser alterado.'
      : 'Preencha os campos abaixo para adicionar um novo conteúdo à base.';

    definirTipoForm(registro ? registro.tipo : 'FAQ');

    $('#campo-subcategoria').value = registro ? registro.subcategoria : '';
    $('#campo-descricao').value = registro ? registro.descricao : '';

  /** Mostra ao vivo o caminho que está sendo montado no formulário. */
  function atualizarPreviaCaminho() {
    const cat = $('#campo-categoria').value.trim();
    const sub = $('#campo-subcategoria').value.trim();
    const desc = $('#campo-descricao').value.trim();
    const alvo = $('#previa-caminho');

    if (!cat && !sub && !desc) {
      alvo.hidden = true;
      return;
    }

    const partes = [cat || 'Categoria', sub, desc].filter(Boolean);
    alvo.innerHTML = partes
      .map(parte => escaparHtml(parte))
      .join('<span class="caminho-sep">›</span>');

  function atualizarContagemTexto() {
    $('#contagem-texto').textContent = $('#campo-texto').value.length;
  }

  function limparInvalidos() {
    $$('.invalido').forEach(el => {
      el.classList.remove('invalido');
      el.removeAttribute('aria-invalid');
      el.removeAttribute('aria-describedby');
    });
    ['categoria', 'descricao', 'texto'].forEach(campo => {

  /**
   * AC-03 — erro anunciado junto ao campo.
   * O toast sozinho não diz QUAL campo falhou para quem usa leitor de tela.
   * @param {string} campo - Sufixo do id (categoria, descricao, texto).
   * @param {string} mensagem
   */
  function marcarInvalido(campo, mensagem) {
    const entrada = $('#campo-' + campo);
    const alvo = $('#erro-' + campo);

    entrada.classList.add('invalido');
    entrada.setAttribute('aria-invalid', 'true');

    if (alvo) {
      alvo.textContent = '⚠ ' + mensagem;
      alvo.hidden = false;
      entrada.setAttribute('aria-describedby', alvo.id);
    }
    entrada.focus();
  }

  /* ----------------------------------------------------------
   * Dashboard — tudo derivado do cache, sem ida ao servidor
   * -------------------------------------------------------- */

  /** Quantos itens exibir nas listas de ranking. */
  const TOPO_RANKING = 8;

  /**
   * Conta ocorrências de um campo e devolve o ranking decrescente.
   * @param {Array} registros
   * @param {Function} extrair - Recebe o registro, devolve a chave (ou '').
   * @returns {Array<{chave: string, total: number, faq: number, tab: number}>}
   */
  function ranking(registros, extrair) {
    const mapa = new Map();

    registros.forEach(r => {
      const chave = extrair(r);
      if (!chave) return;
      if (!mapa.has(chave)) mapa.set(chave, { chave: chave, total: 0, faq: 0, tab: 0 });
      const item = mapa.get(chave);
      item.total++;
      if (r.tipo === 'FAQ') item.faq++; else item.tab++;
    });

    // Empate resolvido alfabeticamente: ordem estável entre recargas.
    return [...mapa.values()].sort((a, b) =>
      b.total - a.total || ordemPtBr(a.chave, b.chave));
  }

  /** Calcula todos os indicadores a partir do cache local. */
  function calcularIndicadores() {
    const regs = Estado.registros;
    const faqs = regs.filter(r => r.tipo === 'FAQ').length;
    const semSub = regs.filter(r => !r.subcategoria).length;

    const categorias = ranking(regs, r => r.categoria);
    const subcategorias = ranking(regs, r => r.subcategoria);
    const autores = ranking(regs, r => r.criadoPor);

    // Data da alteração mais recente (fallback para a criação).
    const ultima = regs.reduce((maior, r) => {
      const t = tempoDe(r.ultimaAlteracao || r.dataCriacao);
      return t > maior.t ? { t: t, texto: r.ultimaAlteracao || r.dataCriacao } : maior;
    }, { t: 0, texto: '—' });

    const recentes = [...regs]
      .sort((a, b) => tempoDe(b.ultimaAlteracao || b.dataCriacao) -
                      tempoDe(a.ultimaAlteracao || a.dataCriacao))
      .slice(0, 5);

    return {
      total: regs.length,
      faqs: faqs,
      tabs: regs.length - faqs,
      favoritos: regs.filter(r => Estado.favoritos.has(r.id)).length,
      categorias: categorias,
      subcategorias: subcategorias,
      autores: autores,
      semSub: semSub,
      ultima: ultima.texto,
      recentes: recentes
    };
  }

  /** Cartão de número principal. */
  function htmlNumero(rotulo, valor, modificador) {
    return `
      <div class="dash-numero ${modificador || ''}">
        <span class="dash-numero-valor">${valor}</span>
        <span class="dash-numero-rotulo">${escaparHtml(rotulo)}</span>
      </div>`;
  }

  /**
   * Linha de barra proporcional. Acessível: cada linha é um botão com
   * rótulo completo, então o leitor de tela recebe o dado, não a forma.
   */
  function htmlBarra(item, maximo, acao) {
    const pct = maximo ? Math.round((item.total / maximo) * 100) : 0;
    const clicavel = !!acao;
    const rotulo = `${item.chave}: ${item.total} registro${item.total === 1 ? '' : 's'}` +
                   (item.faq || item.tab ? ` (${item.faq} FAQ, ${item.tab} tabulação)` : '');

    return `
      <${clicavel ? 'button' : 'div'} class="dash-barra ${clicavel ? 'clicavel' : ''}"
        ${clicavel ? `data-acao="${acao}" data-chave="${escaparHtml(item.chave)}"` : ''}
        style="--matiz:${matizCategoria(item.chave)}"
        aria-label="${escaparHtml(rotulo)}">
        <span class="dash-barra-nome">${escaparHtml(item.chave)}</span>
        <span class="dash-barra-trilho" aria-hidden="true">
          <span class="dash-barra-preenchida" style="width:${pct}%"></span>
        </span>
        <span class="dash-barra-valor">${item.total}</span>
      </${clicavel ? 'button' : 'div'}>`;
  }

  /** Desenha a tela de indicadores. */
  function renderizarDashboard() {
    const d = calcularIndicadores();

    $('#dash-atualizado').textContent = d.total
      ? `${d.total} registros na base · última alteração em ${d.ultima}`
      : 'A base ainda não tem registros.';

    $('#dash-numeros').innerHTML =
      htmlNumero('FAQs', d.faqs, 'e-faq') +
      htmlNumero('Tabulações', d.tabs, 'e-tab') +
      htmlNumero('Categorias', d.categorias.length) +
      htmlNumero('Subcategorias', d.subcategorias.length) +
      htmlNumero('Favoritos', d.favoritos);

    const desenhar = (alvo, lista, acao, vazio) => {
      if (!lista.length) {
        $(alvo).innerHTML = `<p class="dash-vazio">${vazio}</p>`;
        return;
      }
      const maximo = lista[0].total;
      $(alvo).innerHTML = lista.slice(0, TOPO_RANKING)
        .map(item => htmlBarra(item, maximo, acao)).join('');
    };

    desenhar('#dash-categorias', d.categorias, 'filtrar-categoria', 'Nenhuma categoria cadastrada.');
    desenhar('#dash-subcategorias', d.subcategorias, 'filtrar-subcategoria', 'Nenhuma subcategoria cadastrada ainda.');
    desenhar('#dash-autores', d.autores, null, 'Sem autores registrados.');

    $('#dash-recentes').innerHTML = d.recentes.length
      ? d.recentes.map(r => `
          <li>
            <button class="dash-recente" data-acao="abrir" data-id="${r.id}">
              <span class="badge badge-${r.tipo}">${r.tipo === 'FAQ' ? 'FAQ' : 'Tabulação'}</span>
              <span class="dash-recente-nome">${escaparHtml(r.descricao)}</span>
              <span class="dash-recente-data">${escaparHtml(r.ultimaAlteracao || r.dataCriacao)}</span>
            </button>
          </li>`).join('')
      : '<li class="dash-vazio">Nenhuma alteração registrada.</li>';

    // Pendência de classificação só aparece se houver o que classificar.
    const pendencia = $('#dash-pendencia');
    pendencia.hidden = d.semSub === 0;
    if (d.semSub) {
      const pct = Math.round((d.semSub / d.total) * 100);
      $('#dash-pendencia-texto').textContent =
        `${d.semSub} de ${d.total} registros (${pct}%) ainda não têm subcategoria. ` +
        'Classificá-los melhora a localização durante o atendimento.';
    }
  }

  /* ----------------------------------------------------------
   * Configurações
   * -------------------------------------------------------- */

  /** Desenha os cartões de tema (o resto do formulário é estático). */
  function renderizarConfig() {
    $('#config-temas').innerHTML = TEMAS.map(tema => `
      <button class="config-tema" data-tema="${tema.id}" role="radio" aria-checked="false">
        <span class="config-tema-amostra tema-${tema.id}" aria-hidden="true">
          <span></span><span></span><span></span>
        </span>
        <span class="config-tema-nome">${escaparHtml(tema.nome)}</span>
      </button>`).join('');

    marcarPreferenciasNaTela();
    atualizarResumoLocal();
  }

  /** Sincroniza os controles da tela com as preferências vigentes. */
  function marcarPreferenciasNaTela() {
    const p = Estado.prefs;

    $$('#config-temas .config-tema').forEach(botao => {
      const ativo = botao.dataset.tema === p.tema;
      botao.classList.toggle('ativo', ativo);
      botao.setAttribute('aria-checked', String(ativo));
    });

    $$('#view-config [data-pref]').forEach(botao => {
      const ativo = p[botao.dataset.pref] === botao.dataset.valor;
      botao.classList.toggle('ativo', ativo);
      botao.setAttribute('aria-pressed', String(ativo));
    });
  }

  /** Resume o que está guardado neste navegador. */
  function atualizarResumoLocal() {
    const favoritos = Estado.registros.filter(r => Estado.favoritos.has(r.id)).length;
    $('#config-resumo-local').textContent =
      `${favoritos} favorito${favoritos === 1 ? '' : 's'} e ` +
      `${Estado.historico.length} busca${Estado.historico.length === 1 ? '' : 's'} no histórico.`;
  }

  /** Carrega e desenha o conteúdo da lixeira (chamada sob demanda). */
  async function carregarLixeira() {
    const alvo = $('#config-lixeira-lista');
    alvo.innerHTML = '<p class="config-ajuda">Carregando…</p>';

    try {
      const resposta = await servidor('listarLixeira', 30);
      const itens = resposta.registros || [];

      alvo.innerHTML = itens.length
        ? itens.map(r => `
            <div class="lixeira-item">
              <div class="lixeira-info">
                <span class="badge badge-${r.tipo}">${r.tipo === 'FAQ' ? 'FAQ' : 'Tabulação'}</span>
                <span class="lixeira-nome">${escaparHtml(r.descricao)}</span>
                <span class="config-ajuda">
                  ${escaparHtml(r.id)} · excluído por ${escaparHtml(r.excluidoPor || '—')}
                  em ${escaparHtml(r.dataExclusao || '—')}
                </span>
              </div>
              <button class="btn btn-ghost" data-restaurar="${escaparHtml(r.id)}">Restaurar</button>
            </div>`).join('')
        : '<p class="config-ajuda">A lixeira está vazia.</p>';
    } catch (erro) {
      alvo.innerHTML = `<p class="config-ajuda">${escaparHtml(erro.message)}</p>`;
    }
  }

  /** Devolve um registro da lixeira para a base ativa. */
  async function restaurarDaLixeira(id, botao) {
    botao.disabled = true;
    botao.textContent = 'Restaurando…';

    try {
      const resposta = await servidor('restaurarRegistro', id);
      Estado.registros.push(indexar(resposta.registro));
      atualizarCategorias();
      renderizar();
      await carregarLixeira();
      atualizarResumoLocal();
      toast('Registro ' + id + ' restaurado.');
    } catch (erro) {
      botao.disabled = false;
      botao.textContent = 'Restaurar';
      toast(erro.message, 'erro');
    }
  }

  /** Volta todas as preferências ao padrão de fábrica. */
  function restaurarPadroes() {
    Estado.prefs = Object.assign({}, PADROES);
    salvarPreferencias();
    aplicarPreferencias();
    marcarPreferenciasNaTela();
    renderizar();
    toast('Preferências restauradas.');
  }

  /* ----------------------------------------------------------
   * Salvamento (criação e edição)
   * -------------------------------------------------------- */

  async function salvar() {
    if (Estado.salvando) return;

    const dados = {
      tipo: Estado.tipoForm,
      categoria: $('#campo-categoria').value.trim(),
      subcategoria: $('#campo-subcategoria').value.trim(),
      descricao: $('#campo-descricao').value.trim(),
      texto: $('#campo-texto').value.trim()
    };

    // Validação simples no cliente com destaque visual.
    limparInvalidos();
    if (!dados.categoria) return marcarInvalido('categoria', 'Informe a categoria.');
    if (!dados.descricao) return marcarInvalido('descricao', 'Informe a descrição ou cenário.');
    if (!dados.texto) return marcarInvalido('texto', 'Informe o texto.');

    Estado.salvando = true;
    const btn = $('#btn-salvar');
    btn.disabled = true;
    $('#btn-salvar-texto').textContent = 'Salvando…';

    // Captura ANTES de mostrarHome(), que zera Estado.editandoId.
    // Sem isso, o toast de edição exibia "Cadastro realizado" por engano.
    const ehEdicao = !!Estado.editandoId;

    try {
      let resposta;
      if (ehEdicao) {
        resposta = await servidor('updateRecord', Object.assign({ id: Estado.editandoId }, dados));
        const indice = Estado.registros.findIndex(r => r.id === resposta.registro.id);
        if (indice !== -1) Estado.registros[indice] = indexar(resposta.registro);
      } else {
        resposta = await servidor('createRecord', dados);
        Estado.registros.push(indexar(resposta.registro));
      }

      atualizarCategorias();
      renderizar();
      mostrarHome();
      toast(ehEdicao ? 'Alterações salvas com sucesso.' : 'Cadastro realizado com sucesso.');
    } catch (erro) {
      toast(erro.message, 'erro');
    } finally {
      Estado.salvando = false;
      btn.disabled = false;
      $('#btn-salvar-texto').textContent = ehEdicao ? 'Salvar alterações' : 'Salvar';
    }
  }

  /* ----------------------------------------------------------
   * Eventos
   * -------------------------------------------------------- */

  function registrarEventos() {
    // Navegação
    $('#btn-home').addEventListener('click', mostrarHome);
    $('#btn-nav-home').addEventListener('click', mostrarHome);
    $('#btn-novo').addEventListener('click', () => abrirCadastro(null));
    $('#btn-vazio-novo').addEventListener('click', () => abrirCadastro(null));
    $('#btn-limpar').addEventListener('click', limparFiltros);
    $('#btn-atualizar').addEventListener('click', () => revalidar(false));

    // Carrega o próximo lote quando a sentinela entra na tela.
    if ('IntersectionObserver' in window) {
      const observador = new IntersectionObserver((entradas) => {
        // A assinatura dos filtros não muda aqui, então renderizar()
        // preserva o limite ampliado em vez de voltar ao primeiro lote.
        if (entradas[0].isIntersecting && !$('#sentinela').hidden) {
          Estado.limite += LOTE;
          renderizar();
        }
      }, { rootMargin: '300px' });
      observador.observe($('#sentinela'));
    } else {
      // Navegador antigo: sem observador, o botão faz o papel.
      $('#sentinela').addEventListener('click', () => {
        Estado.limite += LOTE;
        renderizar();
      });
    }

    // Ao voltar para a aba, verifica se alguém cadastrou algo nesse meio-tempo.
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState !== 'visible') return;
      if (Estado.tela !== 'home' || !Estado.carregado) return;
      if (Date.now() - Estado.carregadoEm < INTERVALO_REVALIDACAO) return;
      revalidar(true);
    });

    // Dashboard
    $('#btn-dashboard').addEventListener('click', () => {
      renderizarDashboard();
      irPara('dashboard');
    });
    $('#btn-dash-voltar').addEventListener('click', mostrarHome);

    $('#btn-dash-pendencia').addEventListener('click', () => {
      limparFiltrosSilencioso();
      Estado.filtroSubcategoria = SEM_SUB;
      mostrarHome();
      renderizar();
    });

    // Barras e itens recentes levam de volta à lista já filtrada.
    $('#view-dashboard').addEventListener('click', (e) => {
      const alvo = e.target.closest('[data-acao]');
      if (!alvo) return;
      const acao = alvo.dataset.acao;

      if (acao === 'filtrar-categoria') {
        limparFiltrosSilencioso();
        Estado.filtroCategoria = alvo.dataset.chave;
        $('#filtro-categoria').value = alvo.dataset.chave;
        atualizarSubcategorias();
      } else if (acao === 'filtrar-subcategoria') {
        limparFiltrosSilencioso();
        const registro = Estado.registros.find(r => r.subcategoria === alvo.dataset.chave);
        if (registro) {
          Estado.filtroCategoria = registro.categoria;
          $('#filtro-categoria').value = registro.categoria;
          atualizarSubcategorias();
          Estado.filtroSubcategoria = alvo.dataset.chave;
          $('#filtro-subcategoria').value = alvo.dataset.chave;
        }
      } else if (acao === 'abrir') {
        const registro = Estado.registros.find(r => r.id === alvo.dataset.id);
        if (registro) {
          limparFiltrosSilencioso();
          Estado.busca = registro.descricao;
          $('#campo-pesquisa').value = registro.descricao;
        }
      } else {
        return;
      }

      mostrarHome();
      renderizar();
    });
    $('#btn-vazio-limpar').addEventListener('click', limparFiltros);
    $('#btn-config').addEventListener('click', () => {
      renderizarConfig();
      irPara('config');
    });
    $('#btn-config-voltar').addEventListener('click', mostrarHome);

    // Um único ouvinte cobre temas e todos os segmentados de preferência.
    $('#view-config').addEventListener('click', (e) => {
      const tema = e.target.closest('[data-tema]');
      if (tema) { aplicarTema(tema.dataset.tema); return; }

      const pref = e.target.closest('[data-pref]');
      if (pref) definirPreferencia(pref.dataset.pref, pref.dataset.valor);
    });

    $('#btn-lixeira-carregar').addEventListener('click', carregarLixeira);

    $('#config-lixeira-lista').addEventListener('click', (e) => {
      const botao = e.target.closest('[data-restaurar]');
      if (botao) restaurarDaLixeira(botao.dataset.restaurar, botao);
    });

    $('#btn-config-limpar-historico').addEventListener('click', () => {
      limparHistorico();
      atualizarResumoLocal();
    });

    $('#btn-config-limpar-favoritos').addEventListener('click', () => {
      Estado.favoritos.clear();
      salvarFavoritos();
      atualizarResumoLocal();
      renderizar();
      toast('Favoritos removidos.');
    });

    $('#btn-config-restaurar').addEventListener('click', restaurarPadroes);
    $('#btn-cancelar').addEventListener('click', mostrarHome);
    $('#btn-salvar').addEventListener('click', salvar);

    // Pesquisa em tempo real (debounce curto para fluidez).
    let temporizador = null;
    const campoPesquisa = $('#campo-pesquisa');

    campoPesquisa.addEventListener('input', (e) => {
      fecharHistorico();
      clearTimeout(temporizador);
      temporizador = setTimeout(() => {
        Estado.busca = e.target.value;
        renderizar();
      }, 120);
    });

    // Histórico: abre ao focar o campo vazio.
    campoPesquisa.addEventListener('focus', () => {
      if (Estado.prefs.historico === 'sim' && !campoPesquisa.value.trim()) abrirHistorico();
    });

    campoPesquisa.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        registrarBusca(campoPesquisa.value);
        fecharHistorico();
      }
    });

    // mousedown (e não click) para agir antes do blur fechar a caixa.
    $('#historico-busca').addEventListener('mousedown', (e) => {
      e.preventDefault();
      const item = e.target.closest('[data-termo]');
      if (item) {
        campoPesquisa.value = item.dataset.termo;
        Estado.busca = item.dataset.termo;
        registrarBusca(item.dataset.termo);
        fecharHistorico();
        renderizar();
        campoPesquisa.focus();
        return;
      }
      if (e.target.closest('[data-acao="limpar"]')) limparHistorico();
    });

    document.addEventListener('click', (e) => {
      if (!e.target.closest('.busca-wrapper')) fecharHistorico();
    });

    // Filtros rápidos por tipo.
    $$('.chip').forEach(chip => {
      chip.addEventListener('click', () => {
        $$('.chip').forEach(c => {
          c.classList.remove('ativo');
          c.setAttribute('aria-pressed', 'false');
        });
        chip.classList.add('ativo');
        chip.setAttribute('aria-pressed', 'true');
        Estado.filtroTipo = chip.dataset.filtro;
        renderizar();
      });
    });

    // Favoritos: eixo independente, combina com tipo, categoria e busca.
    $('#btn-favoritos').addEventListener('click', () => {
      Estado.somenteFavoritos = !Estado.somenteFavoritos;
      const botao = $('#btn-favoritos');
      botao.classList.toggle('ativo', Estado.somenteFavoritos);
      botao.setAttribute('aria-pressed', String(Estado.somenteFavoritos));
      botao.querySelector('.btn-favoritos-icone').textContent =
        Estado.somenteFavoritos ? '⭐' : '☆';
      renderizar();
    });

    // Filtro por categoria — reinicia o nível seguinte da hierarquia.
    $('#filtro-categoria').addEventListener('change', (e) => {
      Estado.filtroCategoria = e.target.value;
      Estado.filtroSubcategoria = '';
      atualizarSubcategorias();
      renderizar();
    });

    // Filtro por subcategoria.
    $('#filtro-subcategoria').addEventListener('change', (e) => {
      Estado.filtroSubcategoria = e.target.value;
      renderizar();
    });

    // Formulário: categoria digitada refiltra as sugestões de subcategoria.
    $('#campo-categoria').addEventListener('input', () => {
      atualizarSugestoesSubcategoria();
      atualizarPreviaCaminho();
    });
    $('#campo-subcategoria').addEventListener('input', atualizarPreviaCaminho);
    $('#campo-descricao').addEventListener('input', atualizarPreviaCaminho);

    // Tipo no formulário (bloqueado durante edição).
    $$('#seg-tipo .seg-opcao').forEach(btn => {
      btn.addEventListener('click', () => {
        if (Estado.editandoId) return;
        definirTipoForm(btn.dataset.tipo);
      });
    });

    // Contador de caracteres do texto.
    $('#campo-texto').addEventListener('input', atualizarContagemTexto);

    // Delegação de eventos dos cards.
    $('#lista-cards').addEventListener('click', (e) => {
      const botao = e.target.closest('[data-acao]');
      if (!botao) return;

      const card = botao.closest('.card');
      const registro = Estado.registros.find(r => r.id === card.dataset.id);
      if (!registro) return;

      switch (botao.dataset.acao) {
        case 'copiar':
          copiarTexto(registro);
          registrarBusca(Estado.busca); // busca que levou a um uso real
          break;
        case 'favoritar': alternarFavorito(registro.id); break;
        case 'expandir':  alternarExpandido(registro.id); break;
        case 'editar':    abrirCadastro(registro); break;
        case 'imprimir':  imprimirRegistro(registro); break;
        case 'excluir':   pedirExclusao(registro); break;
      }
    });

    // Modal de confirmação.
    $('#modal-cancelar').addEventListener('click', fecharModal);
    $('#modal-confirmar-btn').addEventListener('click', () => {
      const acao = Estado.confirmarAcao;
      fecharModal();
      if (acao) acao();
    });
    $('#modal-confirmar').addEventListener('click', (e) => {
      if (e.target === $('#modal-confirmar')) fecharModal();
    });

    // Foco preso dentro do modal enquanto ele estiver aberto.
    document.addEventListener('keydown', prenderFoco);

    // Atalhos de teclado.
    document.addEventListener('keydown', (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'k') {
        e.preventDefault();
        mostrarHome();
        $('#campo-pesquisa').focus();
        $('#campo-pesquisa').select();
      }
      if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'n') {
        e.preventDefault();
        abrirCadastro(null);
      }
      if (e.key === 'Escape') {
        if (!$('#historico-busca').hidden) fecharHistorico();
        else if (!$('#modal-confirmar').hidden) fecharModal();
        else if (!$('#view-cadastro').hidden) mostrarHome();
      }
    });
  }

  /* ----------------------------------------------------------
   * Inicialização
   * -------------------------------------------------------- */

  document.addEventListener('DOMContentLoaded', () => {
    carregarPreferencias();
    registrarEventos();
    carregarRegistros();
  });
})();
</script>

<!-- ============================================================
     CADASTRO — Tela de cadastro/edição de FAQ e Tabulação
     ============================================================ -->
<section id="view-cadastro" hidden>

  <div class="painel-form">
    <h2 id="form-titulo">Novo Cadastro</h2>
    <p class="form-subtitulo" id="form-subtitulo">Organize o conteúdo em Categoria › Subcategoria › Descrição para facilitar a localização.</p>

    <!-- Tipo -->
    <div class="grupo-campo">
      <label class="rotulo">Tipo</label>
      <div class="segmentado" id="seg-tipo" role="group" aria-label="Tipo do registro">
        <button type="button" class="seg-opcao ativo" data-tipo="FAQ" aria-pressed="true">FAQ</button>
        <button type="button" class="seg-opcao" data-tipo="TAB" aria-pressed="false">Tabulação</button>
      </div>
    </div>

    <!-- Hierarquia: Categoria › Subcategoria › Descrição -->
    <div class="grupo-hierarquia">
      <div class="grupo-campo">
        <label class="rotulo" for="campo-categoria">Categoria</label>
        <input
          type="text"
          id="campo-categoria"
          aria-required="true"
          list="lista-categorias"
          placeholder="Ex.: Cartão de crédito"
          maxlength="80"
          autocomplete="off">
        <datalist id="lista-categorias"></datalist>
        <span class="erro-campo" id="erro-categoria" role="alert" hidden></span>
      </div>

      <div class="grupo-campo">
        <label class="rotulo" for="campo-subcategoria">
          Subcategoria <span class="rotulo-opcional">opcional</span>
        </label>
        <input
          type="text"
          id="campo-subcategoria"
          list="lista-subcategorias"
          placeholder="Ex.: Cancelamento"
          maxlength="80"
          autocomplete="off">
        <datalist id="lista-subcategorias"></datalist>
      </div>
    </div>

    <!-- Prévia do caminho montado -->
    <p class="previa-caminho" id="previa-caminho" hidden></p>

    <!-- Descrição / Cenário -->
    <div class="grupo-campo">
      <label class="rotulo" for="campo-descricao">Descrição / Cenário</label>
      <input
        type="text"
        id="campo-descricao"
          aria-required="true"
        placeholder="Ex.: Qual motivo?"
        maxlength="200"
        autocomplete="off">
      <span class="erro-campo" id="erro-descricao" role="alert" hidden></span>
    </div>

    <!-- Texto -->
    <div class="grupo-campo">
      <label class="rotulo" for="campo-texto">Texto</label>
      <textarea
        id="campo-texto"
        aria-required="true"
        rows="8"
        placeholder="Texto completo que será copiado pelo atendente…"></textarea>
      <span class="erro-campo" id="erro-texto" role="alert" hidden></span>
      <span class="dica-campo"><span id="contagem-texto">0</span> caracteres</span>
    </div>

    <!-- Ações -->
    <div class="form-acoes">
      <button type="button" class="btn btn-ghost" id="btn-cancelar">Cancelar</button>
      <button type="button" class="btn btn-primario" id="btn-salvar">
        <span id="btn-salvar-texto">Salvar</span>
      </button>
    </div>
  </div>

</section>

<style>
/* ============================================================
   BASE DE CONHECIMENTO — Style.html
   Fase 1: fundação visual (design tokens + escala de espaçamento)

   ARQUITETURA DE TOKENS
   1. Escalas globais  → espaçamento, raio, tipografia, movimento
   2. Primitivos       → paleta bruta, definida por tema
   3. Semânticos       → papéis de uso (--superficie, --texto, --borda)

   Regra: componentes usam APENAS tokens semânticos e escalas.
   Criar um tema novo = redefinir os primitivos, nada mais.

   Nenhum nome de classe foi alterado nesta fase — apenas CSS.
   ============================================================ */

/* ------------------------------------------------------------
   1. ESCALAS GLOBAIS (independentes de tema)
   ---------------------------------------------------------- */
:root {
  /* Espaçamento — base 4px. Todo padding/gap/margin sai daqui. */
  --e-1: 4px;
  --e-2: 8px;
  --e-3: 12px;
  --e-4: 16px;
  --e-5: 20px;
  --e-6: 24px;
  --e-8: 32px;
  --e-10: 40px;
  --e-12: 48px;

  /* Raio */
  --r-sm: 6px;
  --r-md: 8px;
  --r-lg: 12px;
  --r-xl: 16px;
  --r-full: 999px;

  /* Tipografia */
  --fonte: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  --t-2xs: 11px;
  --t-xs: 12px;
  --t-sm: 13px;
  --t-base: 14px;
  --t-md: 15px;
  --t-lg: 17px;
  --t-xl: 20px;

  --lh-tight: 1.3;
  --lh-normal: 1.5;
  --lh-leitura: 1.6;

  --ls-titulo: -0.011em;   /* títulos: leve aperto = ar mais profissional */
  --ls-rotulo: 0.04em;     /* labels em caixa alta: respiro */

  /* Movimento */
  --dur-rapida: 110ms;
  --dur-base: 170ms;
  --ease: cubic-bezier(0.2, 0, 0, 1);

  /* Layout */
  --largura-max: 1180px;
  --altura-topbar: 56px;
}

/* ------------------------------------------------------------
   2. PRIMITIVOS POR TEMA + 3. MAPEAMENTO SEMÂNTICO
   ---------------------------------------------------------- */

/* ---------- Tema PortoBank (padrão) ---------- */
:root,
html[data-theme="portobank"] {
  --p-acento: #0047BB;
  --p-acento-hover: #003A9B;
  --p-acento-suave: #EAF0FC;
  --p-acento-linha: #C3D6F7;

  --p-cinza-0: #FFFFFF;
  --p-cinza-50: #F6F8FB;
  --p-cinza-100: #EDF1F7;
  --p-cinza-200: #E1E7F0;
  --p-cinza-300: #7B95BD;   /* borda de controle — 3.04:1 */
  --p-cinza-400: #62718A;   /* texto sutil — 4.63:1 */
  --p-cinza-600: #5A6779;
  --p-cinza-900: #161D29;

  --p-faq: #0047BB;
  --p-faq-suave: #EAF0FC;
  --p-tab: #0B7A55;
  --p-tab-suave: #E4F4EE;
  --p-perigo: #C0332C;
  --p-perigo-suave: #FBEBEA;
  --p-marca: #FFE9A3;

  --sombra-1: 0 1px 2px rgba(16, 27, 48, .06);
  --sombra-2: 0 2px 4px rgba(16, 27, 48, .06), 0 8px 20px rgba(16, 27, 48, .07);
  --sombra-3: 0 12px 40px rgba(16, 27, 48, .18);
  --overlay: rgba(18, 26, 40, .45);
}

/* ---------- Tema Rosa ---------- */
html[data-theme="rosa"] {
  --p-acento: #C42A63;
  --p-acento-hover: #A62153;
  --p-acento-suave: #FCEAF1;
  --p-acento-linha: #F3C9DA;

  --p-cinza-0: #FFFFFF;
  --p-cinza-50: #FBF6F8;
  --p-cinza-100: #F6EDF1;
  --p-cinza-200: #EEDFE6;
  --p-cinza-300: #BD839E;   /* borda de controle — 3.03:1 */
  --p-cinza-400: #8B6575;   /* texto sutil — 4.66:1 */
  --p-cinza-600: #6E5560;
  --p-cinza-900: #2B1A22;

  --p-faq: #C42A63;
  --p-faq-suave: #FCEAF1;
  --p-tab: #0B7A55;
  --p-tab-suave: #E4F4EE;
  --p-perigo: #C0332C;
  --p-perigo-suave: #FBEBEA;
  --p-marca: #FFDCA8;

  --sombra-1: 0 1px 2px rgba(70, 25, 45, .06);
  --sombra-2: 0 2px 4px rgba(70, 25, 45, .06), 0 8px 20px rgba(70, 25, 45, .07);
  --sombra-3: 0 12px 40px rgba(70, 25, 45, .18);
  --overlay: rgba(50, 22, 34, .45);
}

/* ---------- Tema Dark ---------- */
html[data-theme="dark"] {
  --p-acento: #5B95FF;
  --p-acento-hover: #7EAEFF;
  --p-acento-suave: #16243C;
  --p-acento-linha: #2C4470;

  --p-cinza-0: #161C25;      /* superfície */
  --p-cinza-50: #0C1015;     /* fundo da página */
  --p-cinza-100: #1D2531;    /* superfície elevada */
  --p-cinza-200: #2B3545;    /* bordas */
  --p-cinza-300: #546887;   /* borda de controle — 3.01:1 */
  --p-cinza-400: #7C8AA0;   /* texto sutil — 4.89:1 */
  --p-cinza-600: #9DAAC0;
  --p-cinza-900: #EAEFF7;

  --p-faq: #5B95FF;
  --p-faq-suave: #16243C;
  --p-tab: #2FBE89;
  --p-tab-suave: #102E23;
  --p-perigo: #EE6A62;
  --p-perigo-suave: #2E1A1A;
  --p-marca: #6A5316;

  --sombra-1: 0 1px 2px rgba(0, 0, 0, .5);
  --sombra-2: 0 2px 4px rgba(0, 0, 0, .45), 0 8px 22px rgba(0, 0, 0, .4);
  --sombra-3: 0 16px 48px rgba(0, 0, 0, .65);
  --overlay: rgba(5, 8, 12, .68);
}

/* ---------- Camada semântica (comum a todos os temas) ---------- */
:root,
html[data-theme] {
  --fundo: var(--p-cinza-50);
  --superficie: var(--p-cinza-0);
  --superficie-2: var(--p-cinza-100);
  --superficie-hover: var(--p-cinza-100);

  --texto: var(--p-cinza-900);
  --texto-suave: var(--p-cinza-600);
  --texto-sutil: var(--p-cinza-400);

  --borda: var(--p-cinza-200);
  --borda-forte: var(--p-cinza-400);
  /* Contorno de controles interativos: WCAG 1.4.11 exige 3:1 para
     elementos de interface. Bordas puramente decorativas (divisórias,
     contorno de card) seguem em --borda, que é isenta da regra. */
  --borda-controle: var(--p-cinza-300);

  --primaria: var(--p-acento);
  --primaria-forte: var(--p-acento-hover);
  --primaria-suave: var(--p-acento-suave);
  --primaria-linha: var(--p-acento-linha);

  --faq: var(--p-faq);
  --faq-suave: var(--p-faq-suave);
  --tab-cor: var(--p-tab);
  --tab-suave: var(--p-tab-suave);
  --perigo: var(--p-perigo);
  --perigo-suave: var(--p-perigo-suave);
  --marca-fundo: var(--p-marca);

  /* Cores de categoria: o matiz vem do JS, o acabamento vem do tema.
     Valores calculados para que, nos 18 matizes da paleta, o texto da
     pílula mantenha ≥4,5:1 e a própria pílula continue visível como
     forma sobre o card (≥1,18:1). */
  --cat-sat: 60%;
  --cat-luz: 45%;
  --pil-sat-bg: 55%;
  --pil-luz-bg: 80%;
  --pil-sat-fg: 55%;
  --pil-luz-fg: 20%;
}

html[data-theme="dark"] {
  --cat-sat: 58%;
  --cat-luz: 64%;
  --pil-sat-bg: 55%;
  --pil-luz-bg: 28%;
  --pil-sat-fg: 68%;
  --pil-luz-fg: 83%;
}

/* ------------------------------------------------------------
   RESET E BASE
   ---------------------------------------------------------- */
* { box-sizing: border-box; margin: 0; padding: 0; }

/*
 * O atributo hidden é aplicado pelo navegador como display:none via
 * folha de estilo do agente — perde para qualquer regra do autor
 * (ex.: .modal-overlay { display: grid }). Sem esta linha, o modal,
 * o skeleton e o estado vazio nunca desaparecem.
 */
[hidden] { display: none !important; }

html { -webkit-text-size-adjust: 100%; }

body {
  font-family: var(--fonte);
  font-size: var(--t-base);
  line-height: var(--lh-normal);
  background: var(--fundo);
  color: var(--texto);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  transition: background var(--dur-base) var(--ease), color var(--dur-base) var(--ease);
}

button { font: inherit; color: inherit; background: none; border: none; cursor: pointer; }
input, select, textarea { font: inherit; color: inherit; }

mark {
  background: var(--marca-fundo);
  color: inherit;
  border-radius: 3px;
  padding: 0 2px;
  font-weight: 600;
}

/* Visível apenas para leitores de tela. */
.apenas-leitor {
  position: absolute;
  width: 1px;
  height: 1px;
  padding: 0;
  margin: -1px;
  overflow: hidden;
  clip: rect(0, 0, 0, 0);
  white-space: nowrap;
  border: 0;
}

/* Atalho para leitores de tela e navegação por teclado. */
.pular-conteudo {
  position: absolute;
  left: var(--e-4);
  top: calc(var(--e-2) * -6);
  z-index: 200;
  padding: var(--e-2) var(--e-4);
  background: var(--primaria);
  color: #fff;
  border-radius: var(--r-md);
  font-size: var(--t-sm);
  font-weight: 600;
  transition: top var(--dur-base) var(--ease);
}

.pular-conteudo:focus { top: var(--e-2); }

/* Foco visível e consistente em todo o sistema. */
:focus-visible {
  outline: 2px solid var(--primaria);
  outline-offset: 2px;
  border-radius: var(--r-sm);
}

/* ------------------------------------------------------------
   TOPBAR
   ---------------------------------------------------------- */
.topbar {
  position: sticky;
  top: 0;
  z-index: 50;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: var(--e-4);
  height: var(--altura-topbar);
  padding: 0 var(--e-5);
  background: var(--superficie);
  border-bottom: 1px solid var(--borda);
}

.brand {
  display: flex;
  align-items: center;
  gap: var(--e-3);
  border-radius: var(--r-md);
  padding: var(--e-1);
  margin-left: calc(var(--e-1) * -1);
}

.brand-mark {
  display: grid;
  place-items: center;
  width: 30px;
  height: 30px;
  border-radius: var(--r-md);
  background: var(--primaria);
  color: #fff;
  font-size: var(--t-2xs);
  font-weight: 800;
  letter-spacing: var(--ls-rotulo);
}

.brand-nome {
  font-size: var(--t-md);
  font-weight: 650;
  letter-spacing: var(--ls-titulo);
}

.topbar-acoes { display: flex; align-items: center; gap: var(--e-1); }

/* ------------------------------------------------------------
   BOTÕES
   ---------------------------------------------------------- */
.btn {
  display: inline-flex;
  align-items: center;
  gap: var(--e-2);
  height: 34px;
  padding: 0 var(--e-3);
  border-radius: var(--r-md);
  font-size: var(--t-sm);
  font-weight: 600;
  white-space: nowrap;
  transition: background var(--dur-rapida) var(--ease),
              border-color var(--dur-rapida) var(--ease),
              color var(--dur-rapida) var(--ease);
}

.btn:active { transform: translateY(1px); }

.btn-primario {
  background: var(--primaria);
  color: #fff;
  padding: 0 var(--e-4);
}
.btn-primario:hover { background: var(--primaria-forte); }
.btn-primario:disabled { opacity: .55; cursor: progress; }

.btn-ghost { color: var(--texto-suave); }
.btn-ghost:hover { background: var(--superficie-hover); color: var(--texto); }

.btn-perigo { background: var(--perigo); color: #fff; padding: 0 var(--e-4); }
.btn-perigo:hover { filter: brightness(1.07); }

/* ------------------------------------------------------------
   LAYOUT
   ---------------------------------------------------------- */
.conteudo {
  max-width: var(--largura-max);
  margin: 0 auto;
  padding: var(--e-6) var(--e-5) var(--e-12);
}

/* ------------------------------------------------------------
   PAINEL DE BUSCA — elemento principal do sistema
   O trabalho do atendente começa aqui, então a busca recebe
   mais peso visual do que qualquer outro controle da tela.
   ---------------------------------------------------------- */
.painel-busca {
  display: flex;
  flex-direction: column;
  gap: var(--e-4);
  margin-bottom: var(--e-6);
}

.campo-busca {
  display: flex;
  align-items: center;
  gap: var(--e-3);
  height: 48px;
  padding: 0 var(--e-4);
  background: var(--superficie);
  border: 1px solid var(--borda-controle);
  border-radius: var(--r-lg);
  box-shadow: var(--sombra-1);
  transition: border-color var(--dur-rapida) var(--ease),
              box-shadow var(--dur-rapida) var(--ease);
}

.campo-busca:focus-within {
  border-color: var(--primaria);
  box-shadow: 0 0 0 3px var(--primaria-suave);
}

.campo-busca input {
  flex: 1;
  min-width: 0;
  height: 100%;
  border: none;
  background: transparent;
  outline: none;
  font-size: var(--t-md);
}

.campo-busca input::placeholder { color: var(--texto-sutil); }
.campo-busca input::-webkit-search-cancel-button { cursor: pointer; }

.icone-busca { font-size: var(--t-md); opacity: .55; line-height: 1; }

.campo-busca kbd {
  flex-shrink: 0;
  font-family: var(--fonte);
  font-size: var(--t-2xs);
  font-weight: 600;
  color: var(--texto-sutil);
  background: var(--fundo);
  border: 1px solid var(--borda);
  border-radius: var(--r-sm);
  padding: 3px var(--e-2);
}


/* ------------------------------------------------------------
   HISTÓRICO DE PESQUISA (Fase 3)
   ---------------------------------------------------------- */
.busca-wrapper { position: relative; }

.historico {
  position: absolute;
  top: calc(100% + var(--e-1));
  left: 0;
  right: 0;
  z-index: 60;
  padding: var(--e-2);
  background: var(--superficie);
  border: 1px solid var(--borda);
  border-radius: var(--r-lg);
  box-shadow: var(--sombra-2);
  animation: surgir var(--dur-rapida) var(--ease) both;
}

.historico-titulo {
  padding: var(--e-2) var(--e-3);
  font-size: var(--t-2xs);
  font-weight: 700;
  letter-spacing: var(--ls-rotulo);
  text-transform: uppercase;
  color: var(--texto-sutil);
}

.historico-item {
  display: block;
  width: 100%;
  padding: var(--e-2) var(--e-3);
  border-radius: var(--r-sm);
  text-align: left;
  font-size: var(--t-sm);
  color: var(--texto);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  transition: background var(--dur-rapida) var(--ease);
}

.historico-item:hover { background: var(--superficie-2); }

.historico-limpar {
  display: block;
  width: 100%;
  margin-top: var(--e-1);
  padding: var(--e-2) var(--e-3);
  border-top: 1px solid var(--borda);
  border-radius: 0 0 var(--r-sm) var(--r-sm);
  text-align: left;
  font-size: var(--t-xs);
  font-weight: 600;
  color: var(--texto-sutil);
  transition: color var(--dur-rapida) var(--ease);
}

.historico-limpar:hover { color: var(--perigo); }

/* ------------------------------------------------------------
   FILTROS
   ---------------------------------------------------------- */
.linha-filtros {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: var(--e-3);
  flex-wrap: wrap;
}

.chips {
  display: inline-flex;
  gap: var(--e-1);
  padding: var(--e-1);
  background: var(--superficie-2);
  border-radius: var(--r-md);
}

/* Chips e favoritos formam o bloco da esquerda; a hierarquia vai à direita. */
.linha-filtros > .chips,
.linha-filtros > .btn-favoritos { flex-shrink: 0; }

.chip {
  height: 30px;
  padding: 0 var(--e-4);
  border-radius: var(--r-sm);
  font-size: var(--t-sm);
  font-weight: 600;
  color: var(--texto-suave);
  transition: background var(--dur-rapida) var(--ease),
              color var(--dur-rapida) var(--ease);
}

.chip:hover { color: var(--texto); }

.chip.ativo {
  background: var(--superficie);
  color: var(--texto);
  box-shadow: var(--sombra-1);
}

/* A cor só aparece no estado ativo: sinaliza o filtro sem poluir. */
.chip-faq.ativo { color: var(--faq); }
.chip-tab.ativo { color: var(--tab-cor); }

#filtro-categoria {
  height: 32px;
  max-width: 260px;
  padding: 0 var(--e-3);
  background: var(--superficie);
  color: var(--texto);
  border: 1px solid var(--borda-controle);
  border-radius: var(--r-md);
  font-size: var(--t-sm);
  cursor: pointer;
  transition: border-color var(--dur-rapida) var(--ease);
}

#filtro-categoria:hover { border-color: var(--borda-forte); }

.contadores {
  display: flex;
  align-items: center;
  gap: var(--e-2);
  font-size: var(--t-xs);
  color: var(--texto-sutil);
  font-variant-numeric: tabular-nums;
}

.contador strong { color: var(--texto-suave); font-weight: 650; }
.contador-faq strong { color: var(--faq); }
.contador-tab strong { color: var(--tab-cor); }
.separador { opacity: .45; }


/* ------------------------------------------------------------
   CORES DE CATEGORIA E FAVORITOS (Fase 4)
   O matiz chega como --matiz (inline, calculado por hash do nome
   da categoria). Saturação e luminosidade são do tema, então a
   mesma categoria fica legível nos três temas.
   ---------------------------------------------------------- */
/* Cartão favoritado: destaque discreto, sem competir com o tipo. */
.card.favorito {
  border-color: hsl(var(--matiz, 210), var(--cat-sat), var(--cat-luz));
  border-left-width: 3px;
}

.card.favorito .btn-favorito { opacity: 1; }

/* Botão de filtro por favoritos (eixo independente do tipo). */
.btn-favoritos {
  display: inline-flex;
  align-items: center;
  gap: var(--e-2);
  height: 38px;
  padding: 0 var(--e-3);
  border: 1px solid var(--borda-controle);
  border-radius: var(--r-md);
  background: var(--superficie);
  color: var(--texto-suave);
  font-size: var(--t-sm);
  font-weight: 600;
  white-space: nowrap;
  transition: border-color var(--dur-rapida) var(--ease),
              color var(--dur-rapida) var(--ease),
              background var(--dur-rapida) var(--ease);
}

.btn-favoritos:hover { border-color: var(--borda-forte); color: var(--texto); }

.btn-favoritos.ativo {
  border-color: var(--primaria);
  background: var(--primaria-suave);
  color: var(--primaria);
}

.btn-favoritos-icone { font-size: var(--t-base); line-height: 1; }

.contador-fav strong { color: var(--texto-suave); }

/* ------------------------------------------------------------
   CARDS
   Superfícies quase planas com borda de 1px: com dezenas de
   cards na tela, sombra em cada um vira ruído. A elevação
   aparece só no hover, indicando o que está sob o cursor.
   ---------------------------------------------------------- */
.lista-cards {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(330px, 1fr));
  gap: var(--e-4);
  align-items: start;
}

.card {
  position: relative;
  display: flex;
  flex-direction: column;
  gap: var(--e-3);
  padding: var(--e-5);
  padding-left: calc(var(--e-5) - 3px);
  background: var(--superficie);
  border: 1px solid var(--borda);
  border-left: 3px solid var(--borda);
  border-radius: var(--r-lg);
  animation: surgir var(--dur-base) var(--ease) both;
  transition: border-color var(--dur-rapida) var(--ease),
              box-shadow var(--dur-rapida) var(--ease),
              transform var(--dur-rapida) var(--ease);
}

.card:hover {
  box-shadow: var(--sombra-2);
  transform: translateY(-1px);
}

.card.tipo-FAQ { border-left-color: var(--faq); }
.card.tipo-TAB { border-left-color: var(--tab-cor); }

@keyframes surgir {
  from { opacity: 0; transform: translateY(4px); }
  to { opacity: 1; transform: translateY(0); }
}

.card-topo {
  display: flex;
  align-items: center;
  gap: var(--e-2);
  min-height: 20px;
  margin-bottom: calc(var(--e-1) * -1);
}

.badge {
  flex-shrink: 0;
  padding: 2px var(--e-2);
  border-radius: var(--r-sm);
  font-size: var(--t-2xs);
  font-weight: 700;
  letter-spacing: var(--ls-rotulo);
  text-transform: uppercase;
}

.badge-FAQ { background: var(--faq-suave); color: var(--faq); }
.badge-TAB { background: var(--tab-suave); color: var(--tab-cor); }

.card-categoria {
  flex: 1;
  min-width: 0;
  font-size: var(--t-xs);
  font-weight: 600;
  color: var(--texto-sutil);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.btn-favorito {
  flex-shrink: 0;
  display: grid;
  place-items: center;
  width: 26px;
  height: 26px;
  margin: -4px -4px -4px 0;
  border-radius: var(--r-sm);
  font-size: var(--t-base);
  line-height: 1;
  opacity: .3;
  transition: opacity var(--dur-rapida) var(--ease),
              background var(--dur-rapida) var(--ease);
}

.card:hover .btn-favorito { opacity: .55; }
.btn-favorito:hover { opacity: 1; background: var(--superficie-hover); }
.btn-favorito.ativo,
.card:hover .btn-favorito.ativo { opacity: 1; }

/* Alvo primário de leitura: é o que o atendente varre com os olhos. */
.card-descricao {
  font-size: var(--t-md);
  font-weight: 650;
  line-height: var(--lh-tight);
  letter-spacing: var(--ls-titulo);
  color: var(--texto);
}

.card-texto {
  font-size: var(--t-sm);
  line-height: var(--lh-leitura);
  color: var(--texto-suave);
  white-space: pre-wrap;
  word-break: break-word;
}

.card-texto.recolhido {
  display: -webkit-box;
  -webkit-line-clamp: var(--linhas-card, 4);
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.btn-expandir {
  align-self: flex-start;
  margin-top: calc(var(--e-1) * -1);
  font-size: var(--t-xs);
  font-weight: 650;
  color: var(--primaria);
  border-radius: var(--r-sm);
}

.btn-expandir:hover { text-decoration: underline; }

.card-rodape {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: var(--e-3);
  margin-top: auto;
  padding-top: var(--e-3);
  border-top: 1px solid var(--borda);
}

.card-meta {
  min-width: 0;
  font-size: var(--t-2xs);
  line-height: 1.5;
  color: var(--texto-sutil);
}

.card-meta span {
  display: block;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.card-acoes {
  display: flex;
  align-items: center;
  gap: var(--e-1);
  flex-shrink: 0;
}

.btn-icone {
  display: grid;
  place-items: center;
  width: 30px;
  height: 30px;
  border-radius: var(--r-sm);
  font-size: var(--t-sm);
  opacity: .6;
  transition: background var(--dur-rapida) var(--ease),
              opacity var(--dur-rapida) var(--ease);
}

.btn-icone:hover { background: var(--superficie-hover); opacity: 1; }

/* Copiar é o objetivo final de quase todo atendimento: fica evidente. */
.btn-copiar {
  display: inline-flex;
  align-items: center;
  gap: var(--e-1);
  height: 30px;
  padding: 0 var(--e-3);
  border-radius: var(--r-sm);
  background: var(--primaria-suave);
  color: var(--primaria);
  font-size: var(--t-xs);
  font-weight: 650;
  transition: background var(--dur-rapida) var(--ease),
              color var(--dur-rapida) var(--ease);
}

.btn-copiar:hover { background: var(--primaria); color: #fff; }
.btn-copiar:active { transform: translateY(1px); }


/* ------------------------------------------------------------
   HIERARQUIA — Categoria › Subcategoria (Fase 2)
   ---------------------------------------------------------- */
.filtros-hierarquia {
  display: flex;
  align-items: center;
  gap: var(--e-2);
  min-width: 0;
}

.hierarquia-seta {
  color: var(--texto-sutil);
  font-size: var(--t-base);
  line-height: 1;
  user-select: none;
}

#filtro-subcategoria {
  height: 32px;
  max-width: 220px;
  padding: 0 var(--e-3);
  background: var(--superficie);
  color: var(--texto);
  border: 1px solid var(--borda-controle);
  border-radius: var(--r-md);
  font-size: var(--t-sm);
  cursor: pointer;
  transition: border-color var(--dur-rapida) var(--ease), opacity var(--dur-rapida) var(--ease);
}

#filtro-subcategoria:hover:not(:disabled) { border-color: var(--borda-forte); }

/* Desabilitado enquanto nenhuma categoria estiver selecionada:
   comunica a dependência sem precisar de texto explicativo. */
#filtro-subcategoria:disabled {
  opacity: .5;
  cursor: not-allowed;
  background: var(--superficie-2);
}

/* Separador do caminho, usado no card e na prévia do formulário. */
.caminho-sep {
  display: inline-block;
  margin: 0 var(--e-1);
  color: var(--texto-sutil);
  font-weight: 400;
}

/* Dois campos lado a lado no formulário. */
.grupo-hierarquia {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: var(--e-4);
}

.rotulo-opcional {
  margin-left: var(--e-1);
  padding: 1px var(--e-1);
  border-radius: var(--r-sm);
  background: var(--superficie-2);
  color: var(--texto-sutil);
  font-size: var(--t-2xs);
  font-weight: 600;
  letter-spacing: 0;
  text-transform: none;
}

.previa-caminho {
  margin-top: calc(var(--e-3) * -1);
  padding: var(--e-3) var(--e-4);
  background: var(--primaria-suave);
  border-radius: var(--r-md);
  font-size: var(--t-sm);
  font-weight: 600;
  color: var(--primaria);
  line-height: var(--lh-normal);
  word-break: break-word;
}

.previa-caminho .caminho-sep { color: var(--primaria); opacity: .55; }


/* ------------------------------------------------------------
   HIERARQUIA EVIDENTE — pílulas e agrupamento (Fase 6)

   O caminho Categoria › Subcategoria era texto cinza de 12px,
   perdendo a disputa visual para a descrição logo abaixo. Como
   é informação de LOCALIZAÇÃO, passa a ser um objeto reconhecível
   de relance.
   ---------------------------------------------------------- */
.caminho {
  display: flex;
  align-items: center;
  gap: var(--e-1);
  flex: 1;
  min-width: 0;
}

.pilula {
  display: inline-flex;
  align-items: center;
  max-width: 100%;
  padding: 2px var(--e-2);
  border-radius: var(--r-sm);
  font-size: var(--t-xs);
  font-weight: 650;
  line-height: 1.5;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

/* Nível 1 — categoria: cor cheia derivada do nome. */
.pilula-categoria {
  background: hsl(var(--matiz, 210), var(--pil-sat-bg), var(--pil-luz-bg));
  color: hsl(var(--matiz, 210), var(--pil-sat-fg), var(--pil-luz-fg));
  flex-shrink: 0;
}

/* Nível 2 — subcategoria: mesma família, peso menor (contorno). */
.pilula-subcategoria {
  border: 1px solid hsl(var(--matiz, 210), var(--pil-sat-bg), var(--pil-luz-bg));
  color: var(--texto-suave);
  background: transparent;
  min-width: 0;
}

.pilula mark { background: var(--marca-fundo); color: var(--texto); }

/* ---------- Agrupamento da lista ---------- */
.lista-cards.agrupada {
  display: block;
}

.grupo + .grupo { margin-top: var(--e-8); }

.grupo-cabecalho {
  position: sticky;
  top: var(--altura-topbar);
  z-index: 20;
  display: flex;
  align-items: center;
  gap: var(--e-2);
  margin-bottom: var(--e-3);
  padding: var(--e-2) 0;
  background: var(--fundo);
  font-size: var(--t-base);
  font-weight: 700;
  letter-spacing: var(--ls-titulo);
}

.grupo-marca {
  width: 4px;
  height: 16px;
  border-radius: var(--r-full);
  background: hsl(var(--matiz, 210), var(--cat-sat), var(--cat-luz));
  flex-shrink: 0;
}

.grupo-nome {
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.grupo-contagem {
  padding: 1px var(--e-2);
  border-radius: var(--r-full);
  background: var(--superficie-2);
  color: var(--texto-suave);
  font-size: var(--t-2xs);
  font-weight: 650;
  font-variant-numeric: tabular-nums;
}

/* ---------- Limpar filtros ---------- */
.btn-limpar {
  display: inline-flex;
  align-items: center;
  gap: var(--e-1);
  padding: 2px var(--e-2);
  border-radius: var(--r-sm);
  font-size: var(--t-xs);
  font-weight: 650;
  color: var(--primaria);
  transition: background var(--dur-rapida) var(--ease);
}

.btn-limpar:hover { background: var(--primaria-suave); }

/* ------------------------------------------------------------
   SKELETON
   ---------------------------------------------------------- */
.card.skeleton {
  height: 176px;
  border-left-color: var(--borda);
  background: var(--superficie);
  overflow: hidden;
}

.card.skeleton::after {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(100deg,
    transparent 30%,
    var(--superficie-2) 50%,
    transparent 70%);
  background-size: 220% 100%;
  animation: brilho 1.2s infinite linear;
}

@keyframes brilho {
  from { background-position: 140% 0; }
  to { background-position: -60% 0; }
}


/* ------------------------------------------------------------
   ESCALA — carregamento incremental e revalidação (Fase 9)
   ---------------------------------------------------------- */
.sentinela {
  display: flex;
  justify-content: center;
  padding: var(--e-6) var(--e-4);
}

.sentinela-texto {
  font-size: var(--t-xs);
  font-weight: 600;
  color: var(--texto-sutil);
}

.btn-atualizar { color: var(--texto-suave); }
.btn-atualizar:hover { color: var(--primaria); background: var(--primaria-suave); }

.btn-atualizar.girando {
  pointer-events: none;
  animation: girar 900ms linear infinite;
}

@keyframes girar {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

/* ---------- Lixeira ---------- */
.config-lixeira .config-titulo { align-items: center; }

.lixeira-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: var(--e-3);
  padding: var(--e-3) 0;
  border-top: 1px solid var(--borda);
}

.lixeira-info {
  display: flex;
  flex-direction: column;
  gap: 2px;
  min-width: 0;
}

.lixeira-nome {
  font-size: var(--t-sm);
  font-weight: 650;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.lixeira-item .btn {
  flex-shrink: 0;
  border: 1px solid var(--borda-controle);
}

/* ------------------------------------------------------------
   ESTADO VAZIO
   ---------------------------------------------------------- */
.estado-vazio {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: var(--e-3);
  padding: var(--e-12) var(--e-5);
  text-align: center;
  color: var(--texto-suave);
}

.vazio-icone {
  font-size: 30px;
  opacity: .5;
  margin-bottom: var(--e-1);
}

.estado-vazio h3 {
  font-size: var(--t-lg);
  font-weight: 650;
  letter-spacing: var(--ls-titulo);
  color: var(--texto);
}

.estado-vazio p {
  font-size: var(--t-base);
  max-width: 380px;
}

.vazio-acoes {
  display: flex;
  gap: var(--e-2);
  margin-top: var(--e-2);
  flex-wrap: wrap;
  justify-content: center;
}

/* ------------------------------------------------------------
   FORMULÁRIO
   ---------------------------------------------------------- */
.painel-form {
  display: flex;
  flex-direction: column;
  gap: var(--e-5);
  max-width: 660px;
  margin: 0 auto;
  padding: var(--e-8);
  background: var(--superficie);
  border: 1px solid var(--borda);
  border-radius: var(--r-xl);
  box-shadow: var(--sombra-1);
  animation: surgir var(--dur-base) var(--ease) both;
}

.painel-form h2 {
  font-size: var(--t-xl);
  font-weight: 650;
  letter-spacing: var(--ls-titulo);
}

.form-subtitulo {
  margin-top: calc(var(--e-4) * -1);
  font-size: var(--t-sm);
  color: var(--texto-suave);
}

.grupo-campo { display: flex; flex-direction: column; gap: var(--e-2); }

.rotulo {
  font-size: var(--t-xs);
  font-weight: 650;
  letter-spacing: var(--ls-rotulo);
  text-transform: uppercase;
  color: var(--texto-suave);
}

.grupo-campo input,
.grupo-campo textarea {
  width: 100%;
  padding: var(--e-3) var(--e-4);
  background: var(--fundo);
  border: 1px solid var(--borda-controle);
  border-radius: var(--r-md);
  font-size: var(--t-base);
  line-height: var(--lh-normal);
  outline: none;
  resize: vertical;
  transition: border-color var(--dur-rapida) var(--ease),
              box-shadow var(--dur-rapida) var(--ease),
              background var(--dur-rapida) var(--ease);
}

.grupo-campo input::placeholder,
.grupo-campo textarea::placeholder { color: var(--texto-sutil); }

.grupo-campo input:hover,
.grupo-campo textarea:hover { border-color: var(--borda-forte); }

.grupo-campo input:focus,
.grupo-campo textarea:focus {
  background: var(--superficie);
  border-color: var(--primaria);
  box-shadow: 0 0 0 3px var(--primaria-suave);
}

.grupo-campo input.invalido,
.grupo-campo textarea.invalido {
  border-color: var(--perigo);
  border-width: 2px;   /* cor não pode ser o único indicador (WCAG 1.4.1) */
  background: var(--perigo-suave);
}

.erro-campo {
  display: flex;
  align-items: center;
  gap: var(--e-1);
  font-size: var(--t-xs);
  font-weight: 600;
  color: var(--perigo);
}

.dica-campo {
  font-size: var(--t-2xs);
  color: var(--texto-sutil);
  text-align: right;
  font-variant-numeric: tabular-nums;
}

.segmentado {
  display: inline-flex;
  gap: var(--e-1);
  width: fit-content;
  padding: var(--e-1);
  background: var(--superficie-2);
  border-radius: var(--r-md);
}

.seg-opcao {
  height: 32px;
  padding: 0 var(--e-5);
  border-radius: var(--r-sm);
  font-size: var(--t-sm);
  font-weight: 600;
  color: var(--texto-suave);
  transition: background var(--dur-rapida) var(--ease),
              color var(--dur-rapida) var(--ease);
}

.seg-opcao:hover { color: var(--texto); }

.seg-opcao.ativo {
  background: var(--superficie);
  color: var(--faq);
  box-shadow: var(--sombra-1);
}

.seg-opcao[data-tipo="TAB"].ativo { color: var(--tab-cor); }

.segmentado.bloqueado { opacity: .65; }
.segmentado.bloqueado .seg-opcao { cursor: not-allowed; }

.form-acoes {
  display: flex;
  justify-content: flex-end;
  gap: var(--e-2);
  padding-top: var(--e-2);
  border-top: 1px solid var(--borda);
}

.form-acoes .btn { height: 38px; }


/* ------------------------------------------------------------
   DASHBOARD (Fase 7)
   Sem biblioteca de gráficos: barras são divs com largura em %.
   Cada barra é um botão rotulado, então o leitor de tela recebe
   o dado ("Cartão de crédito: 7 registros"), não a forma.
   ---------------------------------------------------------- */
.painel-cabecalho {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: var(--e-4);
  margin-bottom: var(--e-6);
  flex-wrap: wrap;
}

.painel-cabecalho h2 {
  font-size: var(--t-xl);
  font-weight: 650;
  letter-spacing: var(--ls-titulo);
}

.painel-cabecalho .form-subtitulo { margin-top: var(--e-1); }

/* ---------- Números principais ---------- */
.dash-numeros {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: var(--e-3);
  margin-bottom: var(--e-6);
}

.dash-numero {
  display: flex;
  flex-direction: column;
  gap: var(--e-1);
  padding: var(--e-4) var(--e-5);
  background: var(--superficie);
  border: 1px solid var(--borda);
  border-radius: var(--r-lg);
}

.dash-numero-valor {
  font-size: 26px;
  font-weight: 700;
  line-height: 1.1;
  letter-spacing: var(--ls-titulo);
  font-variant-numeric: tabular-nums;
}

.dash-numero-rotulo {
  font-size: var(--t-xs);
  font-weight: 600;
  letter-spacing: var(--ls-rotulo);
  text-transform: uppercase;
  color: var(--texto-sutil);
}

.dash-numero.e-faq .dash-numero-valor { color: var(--faq); }
.dash-numero.e-tab .dash-numero-valor { color: var(--tab-cor); }

/* ---------- Blocos ---------- */
.dash-colunas {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
  gap: var(--e-4);
}

.dash-bloco {
  padding: var(--e-5);
  background: var(--superficie);
  border: 1px solid var(--borda);
  border-radius: var(--r-lg);
}

.dash-titulo {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: var(--e-2);
  margin-bottom: var(--e-4);
  font-size: var(--t-base);
  font-weight: 650;
  letter-spacing: var(--ls-titulo);
}

.dash-dica {
  font-size: var(--t-2xs);
  font-weight: 600;
  color: var(--texto-sutil);
  text-transform: none;
  letter-spacing: 0;
}

/* ---------- Barras ---------- */
.dash-barras { display: flex; flex-direction: column; gap: var(--e-2); }

.dash-barra {
  display: grid;
  grid-template-columns: minmax(0, 1fr) 96px 32px;
  align-items: center;
  gap: var(--e-3);
  width: 100%;
  padding: var(--e-1) var(--e-2);
  border-radius: var(--r-sm);
  text-align: left;
  transition: background var(--dur-rapida) var(--ease);
}

.dash-barra.clicavel:hover { background: var(--superficie-2); }

.dash-barra-nome {
  font-size: var(--t-sm);
  font-weight: 600;
  color: var(--texto);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.dash-barra-trilho {
  height: 8px;
  border-radius: var(--r-full);
  background: var(--superficie-2);
  overflow: hidden;
}

.dash-barra-preenchida {
  display: block;
  height: 100%;
  border-radius: var(--r-full);
  background: hsl(var(--matiz, 210), var(--cat-sat), var(--cat-luz));
  transition: width var(--dur-base) var(--ease);
}

.dash-barra-valor {
  font-size: var(--t-sm);
  font-weight: 700;
  color: var(--texto-suave);
  text-align: right;
  font-variant-numeric: tabular-nums;
}

/* ---------- Recentes ---------- */
.dash-recentes { list-style: none; display: flex; flex-direction: column; gap: var(--e-1); }

.dash-recente {
  display: grid;
  grid-template-columns: auto minmax(0, 1fr) auto;
  align-items: center;
  gap: var(--e-2);
  width: 100%;
  padding: var(--e-2);
  border-radius: var(--r-sm);
  text-align: left;
  transition: background var(--dur-rapida) var(--ease);
}

.dash-recente:hover { background: var(--superficie-2); }

.dash-recente-nome {
  font-size: var(--t-sm);
  font-weight: 600;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.dash-recente-data {
  font-size: var(--t-2xs);
  color: var(--texto-sutil);
  white-space: nowrap;
  font-variant-numeric: tabular-nums;
}

.dash-vazio { font-size: var(--t-sm); color: var(--texto-sutil); }

/* ---------- Pendência ---------- */
.dash-pendencia {
  margin-top: var(--e-4);
  border-color: var(--primaria-linha);
  background: var(--primaria-suave);
}

.dash-pendencia p {
  margin-bottom: var(--e-3);
  font-size: var(--t-sm);
  line-height: var(--lh-leitura);
  color: var(--texto);
}

@media (max-width: 640px) {
  .dash-numeros { grid-template-columns: repeat(2, 1fr); }
  .dash-bloco { padding: var(--e-4); }
  .dash-barra { grid-template-columns: minmax(0, 1fr) 64px 28px; gap: var(--e-2); }
  .painel-cabecalho { flex-direction: column; }
}


/* ------------------------------------------------------------
   CONFIGURAÇÕES (Fase 8)
   ---------------------------------------------------------- */
.config-blocos {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
  gap: var(--e-4);
  align-items: start;
}

.config-bloco {
  padding: var(--e-5);
  background: var(--superficie);
  border: 1px solid var(--borda);
  border-radius: var(--r-lg);
}

.config-titulo {
  margin-bottom: var(--e-4);
  font-size: var(--t-base);
  font-weight: 650;
  letter-spacing: var(--ls-titulo);
}

.config-opcao {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: var(--e-4);
  padding: var(--e-3) 0;
  flex-wrap: wrap;
}

.config-opcao + .config-opcao { border-top: 1px solid var(--borda); }

.config-rotulo {
  display: flex;
  flex-direction: column;
  gap: 2px;
  min-width: 0;
}

.config-rotulo > span:first-child {
  font-size: var(--t-sm);
  font-weight: 650;
}

.config-ajuda {
  font-size: var(--t-xs);
  line-height: var(--lh-normal);
  color: var(--texto-sutil);
}

/* ---------- Escolha de tema ---------- */
.config-temas {
  display: grid;

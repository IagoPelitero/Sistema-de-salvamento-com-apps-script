<!-- ============================================================
     HOME — Tela principal: pesquisa, filtros e lista de cards
     ============================================================ -->
<section id="view-home">

  <!-- Barra de pesquisa e filtros -->
  <div class="painel-busca">
    <div class="busca-wrapper">
      <div class="campo-busca">
        <span class="icone-busca">🔍</span>
        <input
          type="search"
          id="campo-pesquisa"
          aria-label="Pesquisar na base de conhecimento"
          aria-describedby="dica-pesquisa"
          placeholder="Pesquisar — várias palavras filtram por todas elas"
          autocomplete="off"
          spellcheck="false">
        <kbd class="so-desktop">Ctrl K</kbd>
      </div>

      <span id="dica-pesquisa" class="apenas-leitor">
        Digite para filtrar em tempo real. Várias palavras exigem todas elas.
        Pressione Escape para fechar as buscas recentes.
      </span>

      <!-- Buscas recentes (abre ao focar o campo vazio) -->
      <div class="historico" id="historico-busca" role="listbox"
           aria-label="Buscas recentes" hidden></div>
    </div>

    <div class="linha-filtros">
      <!-- Filtros rápidos por tipo -->
      <div class="chips" role="group" aria-label="Filtrar por tipo">
        <button class="chip ativo" data-filtro="TODOS" aria-pressed="true">Todos</button>
        <button class="chip chip-faq" data-filtro="FAQ" aria-pressed="false">FAQs</button>
        <button class="chip chip-tab" data-filtro="TAB" aria-pressed="false">Tabulações</button>
      </div>

      <!-- Eixo independente do tipo: combina com qualquer outro filtro -->
      <button class="btn-favoritos" id="btn-favoritos" aria-pressed="false"
              title="Mostrar apenas os favoritos">
        <span class="btn-favoritos-icone">☆</span>
        <span class="so-desktop">Favoritos</span>
      </button>

      <!-- Filtros hierárquicos: subcategoria depende da categoria -->
      <div class="filtros-hierarquia">
        <select id="filtro-categoria" title="Filtrar por categoria" aria-label="Filtrar por categoria">
          <option value="">Todas as categorias</option>
        </select>
        <span class="hierarquia-seta" aria-hidden="true">›</span>
        <select id="filtro-subcategoria" title="Filtrar por subcategoria" aria-label="Filtrar por subcategoria" disabled>
          <option value="">Todas as subcategorias</option>
        </select>
      </div>
    </div>

    <!-- Contadores -->
    <div class="contadores" id="contadores" role="status" aria-live="polite" aria-atomic="true">
      <span class="contador contador-faq"><strong id="qtd-faq">0</strong> FAQs</span>
      <span class="separador">·</span>
      <span class="contador contador-tab"><strong id="qtd-tab">0</strong> Tabulações</span>
      <span class="separador">·</span>
      <span class="contador contador-fav"><strong id="qtd-fav">0</strong> favoritos</span>
      <span class="separador" id="sep-resultados" hidden>·</span>
      <span class="contador" id="qtd-resultados" hidden></span>
      <button class="btn-limpar" id="btn-limpar" hidden>✕ Limpar filtros</button>
      <button class="btn-limpar btn-atualizar" id="btn-atualizar" title="Buscar cadastros novos">↻ Atualizar</button>
    </div>
  </div>

  <!-- Esqueleto de carregamento -->
  <div id="skeleton" class="lista-cards" role="status" aria-label="Carregando registros">
    <div class="card skeleton"></div>
    <div class="card skeleton"></div>
    <div class="card skeleton"></div>
    <div class="card skeleton"></div>
  </div>

  <!-- Lista de registros -->
  <div id="lista-cards" class="lista-cards" hidden></div>

  <!-- Carrega mais registros ao entrar na área visível -->
  <div id="sentinela" class="sentinela" hidden>
    <span class="sentinela-texto">Carregando mais registros…</span>
  </div>

  <!-- Estado vazio -->
  <div id="estado-vazio" class="estado-vazio" hidden>
    <div class="vazio-icone">📭</div>
    <h3 id="vazio-titulo">Nenhum registro encontrado</h3>
    <p id="vazio-texto">Ajuste a pesquisa ou cadastre um novo conteúdo.</p>
    <div class="vazio-acoes">
      <button class="btn btn-ghost" id="btn-vazio-limpar" hidden>✕ Limpar filtros</button>
      <button class="btn btn-primario" id="btn-vazio-novo">➕ Novo Cadastro</button>
    </div>
  </div>

</section>
